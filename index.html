<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>PH Law Firm Manager – Mobile-Friendly Task Management</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #0d47a1;
      --primary-light: #e8f0fe;
      --navy: #0a2540;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #5f6368;
      --border: #e0e0e0;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
      --sidebar-w: 260px;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #dc2626;
      --info: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    /* Auth Styles */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f0f4ff, #e8edf5);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: clamp(24px, 5vw, 40px) clamp(20px, 4vw, 32px);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .auth-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
    .inp { margin-bottom: 14px; text-align: left; }
    .inp label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .inp input, .inp select, .inp textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
      font-family: inherit;
      transition: all 0.2s;
    }
    .inp input:focus, .inp select:focus, .inp textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,71,161,0.1); }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .btn-p { background: var(--primary); color: #fff; }
    .btn-p:hover { background: #0a3a7e; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(13,71,161,0.3); }
    .btn-o { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-o:hover { background: #f8f9fa; border-color: var(--primary); }
    .btn-d { background: var(--danger); color: #fff; }
    .btn-d:hover { background: #b91c1c; }
    .btn-sm { padding: 8px 14px; font-size: 13px; gap: 6px; min-height: 40px; }
    .btn-google { background: #fff; border: 1px solid var(--border); color: var(--text); width: 100%; }
    .tabs { display: flex; gap: 15px; margin-bottom: 22px; justify-content: center; flex-wrap: wrap; }
    .tab { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; transition: 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .err { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; }
    .suc { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--text-secondary); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100%;
      background: var(--navy);
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 20px rgba(0,0,0,0.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 150; backdrop-filter: blur(2px); }
    .sidebar-backdrop.show { display: block; }
    .sidebar-head { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-head .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .sidebar-close { background: none; border: none; font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7); padding: 8px; border-radius: 8px; }
    .sidebar-close:hover { background: rgba(255,255,255,0.1); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      margin: 4px 12px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: 0.2s;
      border-radius: 10px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }
    .nav-item i { width: 24px; text-align: center; font-size: 18px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.6); }
    /* Main Content */
    .main-content { flex: 1; padding: clamp(16px, 3vw, 32px); min-height: 100vh; width: 100%; overflow-x: hidden; }
    .topbar {
      background: #fff;
      padding: clamp(12px, 2vw, 20px) clamp(16px, 3vw, 24px);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; padding: 12px; border-radius: 8px; }
    .hamburger:hover { background: #f0f0f0; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .sync-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 6px; background: #e8f0fe; color: var(--primary); }
    .sync-badge.online { background: #d1fae5; color: #065f46; }
    .sync-badge.offline { background: #fee2e2; color: #b91c1c; }
    .firm-id { background: #f0f4ff; padding: 4px 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
    .logout-btn { padding: 6px 14px; background: none; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { background: #fee2e2; border-color: var(--danger); color: var(--danger); }
    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #fff; padding: clamp(16px, 3vw, 24px); border-radius: 16px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); cursor: pointer; transition: all 0.2s; }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .card.green { border-left-color: var(--success); }
    .card.orange { border-left-color: var(--warning); }
    .card.purple { border-left-color: #8b5cf6; }
    .card-val { font-size: clamp(28px, 5vw, 36px); font-weight: 700; line-height: 1.2; }
    .card-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    /* Tables */
    .table-wrap { background: #fff; border-radius: 16px; box-shadow: var(--shadow); overflow-x: auto; margin-bottom: 24px; }
    .task-table { width: 100%; min-width: 500px; border-collapse: collapse; }
    .task-table th { text-align: left; padding: 14px 16px; background: #f8fafd; color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .task-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .task-table tr:hover { background: #f0f7ff; cursor: pointer; }
    .badge-s { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #e5e7eb; color: #374151; }
    .badge-s.completed { background: #d1fae5; color: #065f46; }
    .badge-s.in_progress { background: #dbeafe; color: #1e40af; }
    .badge-s.pending { background: #fed7aa; color: #9a3412; }
    /* Case Page */
    .case-header { background: #fff; border-radius: 20px; padding: clamp(20px, 4vw, 32px); margin-bottom: 24px; box-shadow: var(--shadow); }
    .case-title-section { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; }
    .case-title { font-size: clamp(22px, 5vw, 32px); font-weight: 700; color: var(--primary); word-break: break-word; }
    .case-badge { display: inline-block; padding: 4px 14px; border-radius: 30px; font-size: 12px; font-weight: 600; background: #d1fae5; color: #065f46; }
    .case-id { color: var(--text-secondary); font-size: 12px; margin-bottom: 20px; font-family: monospace; word-break: break-all; }
    .case-tabs { display: flex; gap: clamp(16px, 4vw, 32px); border-bottom: 1px solid var(--border); margin-top: 20px; overflow-x: auto; scrollbar-width: thin; }
    .case-tab { padding: 12px 0; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; white-space: nowrap; }
    .case-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .case-content { background: #fff; border-radius: 20px; padding: clamp(20px, 4vw, 32px); box-shadow: var(--shadow); }
    .two-columns { display: grid; grid-template-columns: 1fr 340px; gap: 28px; }
    @media (max-width: 900px) { .two-columns { grid-template-columns: 1fr; gap: 24px; } }
    /* TASK DETAIL MODAL - FULLY MOBILE RESPONSIVE */
    .task-detail-modal { 
      max-width: 600px; 
      width: 95%; 
      margin: 0 auto;
      border-radius: 24px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .task-detail-modal .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .task-detail-section { 
      margin-bottom: 24px; 
      background: #f8fafd;
      border-radius: 16px;
      padding: 16px;
    }
    .task-detail-section h4 { 
      font-size: 13px; 
      font-weight: 700; 
      color: var(--primary); 
      margin-bottom: 12px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .info-label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 12px;
      min-width: 90px;
    }
    .info-value {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
      flex: 1;
    }
    .time-entry-item, .subtask-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-entry-info, .subtask-info {
      flex: 1;
      min-width: 150px;
    }
    .action-button-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .action-button-group .btn {
      flex: 1;
      min-width: 100px;
    }
    /* Modal */
    .modal-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: rgba(0,0,0,0.5); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      z-index: 1000; 
      padding: 16px; 
    }
    .modal { 
      background: #fff; 
      width: 100%; 
      max-width: 650px; 
      max-height: 90vh; 
      border-radius: 24px; 
      overflow-y: auto; 
      animation: modalSlideIn 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    @keyframes modalSlideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-head { 
      padding: 18px 20px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      background: #fff; 
      z-index: 10;
      flex-wrap: wrap;
      gap: 10px;
    }
    .modal-head h2 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .modal-close { 
      background: none; 
      border: none; 
      font-size: 24px; 
      cursor: pointer; 
      padding: 8px; 
      border-radius: 8px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: #f0f0f0; }
    .modal-body { padding: 20px; flex: 1; overflow-y: auto; }
    .modal-foot { 
      padding: 16px 20px; 
      border-top: 1px solid var(--border); 
      display: flex; 
      gap: 12px; 
      justify-content: flex-end; 
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: #fff;
    }
    .modal-foot .btn {
      min-width: 100px;
    }
    .fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .ffull { grid-column: 1 / -1; }
    .empty { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar { left: -260px; width: 260px; }
      .sidebar.open { left: 0; transform: translateX(0); }
      .sidebar-backdrop.show { display: block; }
      .hamburger { display: block; }
      .main-content { padding: 16px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .user-info { width: 100%; justify-content: flex-start; }
      .cards { grid-template-columns: 1fr; }
      .case-header { padding: 20px; }
      .case-tabs { gap: 16px; }
      .case-tab { font-size: 13px; }
      .btn-sm { padding: 10px 14px; font-size: 14px; }
      .modal-head { padding: 16px; }
      .modal-body { padding: 16px; }
      .modal-foot { padding: 16px; }
      .modal-foot .btn { min-width: 80px; }
      .info-row { flex-direction: column; gap: 4px; }
      .info-label { min-width: auto; }
      .task-detail-section { padding: 14px; }
      .action-button-group .btn { min-width: 80px; }
    }
    @media (max-width: 480px) {
      .case-title-section { flex-direction: column; align-items: flex-start; }
      .case-badge { align-self: flex-start; }
      .modal-head h2 { font-size: 16px; }
      .btn-sm { padding: 10px 12px; font-size: 13px; }
      .action-button-group { flex-direction: column; }
      .action-button-group .btn { width: 100%; }
    }
    @media (min-width: 769px) {
      .sidebar { transform: translateX(0); position: sticky; top: 0; height: 100vh; }
      .hamburger { display: none; }
      .sidebar-backdrop { display: none !important; }
      .sidebar-close { display: none; }
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
  </style>
</head>

<div id="app"></div>
<script>
(function(){
// Firebase Config
const fbConfig={apiKey:"AIzaSyA1ptQA0We00UCjzY6NbK_ePHNEUMKxfV0",authDomain:"deep-seek-law-task-manager.firebaseapp.com",databaseURL:"https://deep-seek-law-task-manager-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"deep-seek-law-task-manager",storageBucket:"deep-seek-law-task-manager.firebasestorage.app",messagingSenderId:"349212320419",appId:"1:349212320419:web:5ab238257571ec5b925516"};
let useFB=false;try{firebase.initializeApp(fbConfig);useFB=true}catch(e){console.warn("Firebase offline mode");}
const auth=useFB?firebase.auth():null;
const db=useFB?firebase.database():null;
const LS={U:'law_users',F:'law_firms',T:'law_tasks',C:'law_cases',TE:'law_teams',CUR:'law_current_user',TL:'law_time_logs'};

function g(k){return JSON.parse(localStorage.getItem(k)||'[]')}
function s(k,v){localStorage.setItem(k,JSON.stringify(v))}

// Data Service
const DS={
genId:()=>'LF-'+Math.random().toString(36).substr(2,8).toUpperCase(),
async uprofile(uid){if(useFB){const sn=await db.ref(`users/${uid}`).once('value');return sn.val()}return g(LS.U).find(x=>x.id===uid)},
async sprofile(uid,d){d.id=uid;if(useFB)await db.ref(`users/${uid}`).set(d);else{const u=g(LS.U);const i=u.findIndex(x=>x.id===uid);if(i>=0)u[i]=d;else u.push(d);s(LS.U,u)}},
async allU(){if(useFB){const sn=await db.ref('users').once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.U)},
async firms(){if(useFB){const sn=await db.ref('firms').once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.F)},
async sFirm(d){if(useFB)await db.ref(`firms/${d.firmId}`).set(d);else{const f=g(LS.F);const i=f.findIndex(x=>x.firmId===d.firmId);if(i>=0)f[i]=d;else f.push(d);s(LS.F,f)}},
async findFirm(id){const f=await this.firms();return f.find(x=>x.firmId===id)},
async addFirm(d){const n={...d,createdAt:new Date().toISOString()};await this.sFirm(n);return n},
async tasks(fid){if(useFB){const sn=await db.ref('tasks').orderByChild('lawFirmId').equalTo(fid).once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.T).filter(t=>t.lawFirmId===fid)},
async addTask(t){t.id='T'+Date.now();t.createdAt=t.updatedAt=new Date().toISOString();if(useFB)await db.ref(`tasks/${t.id}`).set(t);else{const a=g(LS.T);a.push(t);s(LS.T,a)}return t},
async updTask(id,u){u.updatedAt=new Date().toISOString();if(useFB){await db.ref(`tasks/${id}`).update(u);return await db.ref(`tasks/${id}`).once('value').then(s=>s.val())}else{const a=g(LS.T);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...u};s(LS.T,a);return a[i]}return null}},
async delTask(id){if(useFB){const all=await this.tasks(ST.user?.lawFirmId);const subs=all.filter(t=>t.parentTaskId===id).map(t=>t.id);const up={};up[`tasks/${id}`]=null;subs.forEach(s=>up[`tasks/${s}`]=null);await db.ref().update(up)}else{let a=g(LS.T);a=a.filter(t=>t.id!==id);s(LS.T,a)}},
async cases(fid){if(useFB){const sn=await db.ref('cases').orderByChild('lawFirmId').equalTo(fid).once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.C).filter(c=>c.lawFirmId===fid)},
async addCase(c){c.id='C'+Date.now();c.hearings=c.hearings||[];c.updates=c.updates||[];c.createdAt=new Date().toISOString();if(useFB)await db.ref(`cases/${c.id}`).set(c);else{const a=g(LS.C);a.push(c);s(LS.C,a)}return c},
async updCase(id,u){if(useFB){await db.ref(`cases/${id}`).update(u);return await db.ref(`cases/${id}`).once('value').then(s=>s.val())}else{const a=g(LS.C);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...u};s(LS.C,a);return a[i]}return null}},
async delCase(id){if(useFB)await db.ref(`cases/${id}`).remove();else{let a=g(LS.C);a=a.filter(c=>c.id!==id);s(LS.C,a)}},

// Helper functions
function formatDate(dateString) {
  if(!dateString) return '';
  const d = new Date(dateString);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function formatDateTime(dateString) {
  if(!dateString) return '';
  const d = new Date(dateString);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtAssignees(ids, users) {
  if(!ids || !ids.length) return '-';
  return ids.map(id => { const u = users.find(x=>x.id===id); return u ? `${u.firstName} ${u.lastName}` : '?'; }).join(', ');
}
function generateICalendarEvent(caseObj, hearing) {
  const startDateTime = new Date(`${hearing.date}T${hearing.time || '09:00'}:00`);
  const endDateTime = new Date(startDateTime.getTime() + 60*60*1000);
  const formatICSDate = (date) => date.toISOString().replace(/-|:|\.\d+/g, '');
  return `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//PH Law Firm Manager//EN
BEGIN:VEVENT
UID:${Date.now()}-${Math.random().toString(36).substr(2,8)}@phlawmanager.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDateTime)}
DTEND:${formatICSDate(endDateTime)}
SUMMARY:⚖️ Hearing: ${caseObj.caseName}
DESCRIPTION:Case: ${caseObj.caseName}\\nClient: ${caseObj.clientName || 'N/A'}\\nReference: ${caseObj.caseRef || 'N/A'}\\nHearing: ${hearing.description || 'Court hearing'}
LOCATION:Court Hearing
BEGIN:VALARM
TRIGGER:-PT${hearing.reminderMinutes || 30}M
ACTION:DISPLAY
DESCRIPTION:Reminder: Hearing in ${caseObj.caseName}
END:VALARM
END:VEVENT
END:VCALENDAR`;
}
async function syncToGoogleCalendar(caseObj, hearing) {
  const icalData = generateICalendarEvent(caseObj, hearing);
  const blob = new Blob([icalData], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hearing_${caseObj.caseName.replace(/\s/g,'_')}_${hearing.date}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  return true;
}

async function render(){
  try{
    const app=document.getElementById('app');
    if(!ST.user){
      app.innerHTML=aScr();
      bind();
      return;
    }
    const firm=await DS.findFirm(ST.user.lawFirmId);
    app.innerHTML=mainApp(firm?firm.firmName:'Unknown Firm');
    document.getElementById('main-area').innerHTML=await curView();
    if(window.innerWidth>=769){document.getElementById('sidebar').classList.add('open');}
    if(ST.modal)renderModal();
    if(ST.taskDetailModal && ST.selT) renderTaskDetailModal();
    bind();
  }catch(e){console.error(e);}
}

async function curView(){
  if(ST.user.role==='client'){
    if(ST.view==='cases' && ST.selC) return await caseDetailView();
    return await clientDashboard();
  }
  switch(ST.view){
    case 'dashboard': return await dashboardView();
    case 'cases': return ST.selC ? await caseDetailView() : await casesListView();
    case 'tasks': return await tasksView();
    case 'teams': return await teamsView();
    case 'members': return await membersView();
    case 'approvals': return await approvalsView();
    case 'timesheets': return await timesheetsView();
    case 'reports': return await reportsView();
    case 'profile': return await profileView();
    default: return await dashboardView();
  }
}

async function approvalsView(){

async function timesheetsView(){
  const logs = await DS.getTimeLogsByUser(ST.user.id, ST.user.lawFirmId);
  const tasks = await DS.tasks(ST.user.lawFirmId);
  const taskMap = Object.fromEntries(tasks.map(t=>[t.id,t]));
  let totalHours=0,totalBillable=0;
  logs.forEach(l=>{ totalHours+=l.durationMinutes/60; if(l.billable) totalBillable+=l.durationMinutes/60*(ST.user.hourlyRate||0); });
  return `<div style="background:#fff;border-radius:16px;padding:24px;"><h2>My Timesheet</h2><div class="cards"><div class="card"><div class="card-val">${totalHours.toFixed(1)}h</div><div class="card-label">Total Logged</div></div><div class="card green"><div class="card-val">₱${totalBillable.toFixed(0)}</div><div class="card-label">Billable Amount</div></div></div><button class="btn btn-p btn-sm" id="addTimeBtn">+ Log Time</button><div class="table-wrap" style="margin-top:20px;"><table class="task-table"><thead><tr><th>Task</th><th>Date</th><th>Duration</th><th>Billable</th><th>Notes</th><th></th></tr></thead><tbody>${logs.map(l=>`<tr><td>${taskMap[l.taskId]?.title||'?'}</td><td>${l.date}</td><td>${l.durationMinutes}min</td><td>${l.billable?'✅':'❌'}</td><td>${l.notes||''}</td><td><button class="btn btn-d btn-sm delete-time-log" data-id="${l.id}">Del</button></td></tr>`).join('')||'<tr><td colspan="6">No time entries</td></tr>'}</tbody></table></div></div>`;
}
async function reportsView(){
  const cases = await DS.cases(ST.user.lawFirmId);
  const tasks = await DS.tasks(ST.user.lawFirmId);
  const logs = await DS.getTimeLogsByUser(ST.user.id, ST.user.lawFirmId);
  const totalHours = logs.reduce((s,l)=>s+l.durationMinutes/60,0);
  setTimeout(()=>{ const ctx=document.getElementById('reportChart')?.getContext('2d'); if(ctx && ST.reportChart) ST.reportChart.destroy(); if(ctx && window.Chart){ ST.reportChart=new Chart(ctx,{type:'bar',data:{labels:['Active Cases','Total Tasks','Hours Logged'],datasets:[{label:'Overview',data:[cases.length,tasks.length,totalHours],backgroundColor:'#0d47a1'}]}}); } },100);
  return `<div style="background:#fff;border-radius:16px;padding:24px;"><h2>Advanced Reporting</h2><canvas id="reportChart" height="200" style="margin-bottom:20px;max-height:300px;"></canvas><div class="cards"><div class="card"><div class="card-val">${cases.length}</div><div class="card-label">Active Cases</div></div><div class="card orange"><div class="card-val">${tasks.filter(t=>t.status!=='completed').length}</div><div class="card-label">Pending Tasks</div></div><div class="card green"><div class="card-val">${totalHours.toFixed(1)}h</div><div class="card-label">Hours Logged</div></div></div></div>`;
}

  if(ST.modalMode === 'hearing'){

// TASK DETAIL MODAL - FULLY MOBILE RESPONSIVE with INFO ROWS
function taskDetailModalHtml(){return `<div class="modal-overlay" id="taskModalOverlay"><div class="modal task-detail-modal"><div class="modal-head"><h2><i class="fas fa-tasks"></i> Task Details</h2><button class="modal-close" id="closeTaskModalBtn">✕</button></div><div class="modal-body" id="taskModalBody"></div><div class="modal-foot"><button class="btn btn-o" id="editTaskFromDetailBtn"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-d" id="deleteTaskBtn"><i class="fas fa-trash"></i> Delete</button><button class="btn btn-p" id="closeTaskModalFootBtn">Close</button></div></div></div>`;}
async function renderTaskDetailModal(){
  const body = document.getElementById('taskModalBody');
  if(!body || !ST.selT) return;
  const task = ST.selT;
  const users = await DS.allU();
  const assignees = (task.assigneeIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
  const timeLogs = await DS.getTimeLogsByTask(task.id);
  const totalMinutes = timeLogs.reduce((s,l)=>s+l.durationMinutes,0);
  const allTasks = await DS.tasks(ST.user.lawFirmId);
  const subtasks = allTasks.filter(st=>st.parentTaskId===task.id);
  const caseInfo = task.caseId ? (await DS.cases(ST.user.lawFirmId)).find(c=>c.id===task.caseId) : null;
  
  body.innerHTML = `
    <div class="task-detail-section">
      <h4>Basic Information</h4>
      <div class="info-row"><span class="info-label">Title:</span><span class="info-value">${task.title}</span></div>
      <div class="info-row"><span class="info-label">Status:</span><span class="info-value"><span class="badge-s ${task.status}">${task.status||'pending'}</span></span></div>
      <div class="info-row"><span class="info-label">Priority:</span><span class="info-value"><span class="badge-s">${task.priority||'medium'}</span></span></div>
      <div class="info-row"><span class="info-label">Due Date:</span><span class="info-value">${task.dueDate ? formatDate(task.dueDate) : 'Not set'}</span></div>
      <div class="info-row"><span class="info-label">Created:</span><span class="info-value">${formatDate(task.createdAt)}</span></div>
      <div class="info-row"><span class="info-label">Last Updated:</span><span class="info-value">${formatDate(task.updatedAt)}</span></div>
    </div>
    <div class="task-detail-section">
      <h4>Description</h4>
      <div class="info-value">${task.description || 'No description provided.'}</div>
    </div>
    <div class="task-detail-section">
      <h4>Assignees</h4>
      <div class="info-value">${assignees.length ? assignees.map(a=>`${a.firstName} ${a.lastName}`).join(', ') : 'None'}</div>
    </div>
    ${caseInfo ? `<div class="task-detail-section"><h4>Related Case</h4><div class="info-value"><a href="#" onclick="selectCase('${caseInfo.id}'); return false;">${caseInfo.caseName}</a></div></div>` : ''}
    <div class="task-detail-section">
      <h4>Tags</h4>
      <div class="info-value">${(task.tags||[]).join(', ') || 'None'}</div>
    </div>
    <div class="task-detail-section">
      <h4>Notes</h4>
      <div class="info-value">${task.notes || 'None'}</div>
    </div>
    <div class="task-detail-section">
      <h4>Time Logged <button class="btn btn-o btn-sm" id="addTimeToTaskBtn" style="margin-left:8px;"><i class="fas fa-clock"></i> Log Time</button></h4>
      <div class="info-row"><span class="info-label">Total:</span><span class="info-value">${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m</span></div>
      ${timeLogs.length ? `<div style="margin-top:12px;">${timeLogs.map(l=>`<div class="time-entry-item"><div class="time-entry-info"><strong>${l.date}</strong> - ${l.durationMinutes} min ${l.billable?'(Billable)':''}</div><button class="btn btn-d btn-sm delete-time-log-task" data-id="${l.id}">✕</button></div>`).join('')}</div>` : '<div class="info-value">No time entries yet.</div>'}
    </div>
    <div class="task-detail-section">
      <h4>Subtasks <button class="btn btn-o btn-sm" id="addSubtaskBtn"><i class="fas fa-plus"></i> Add Subtask</button></h4>
      ${subtasks.length ? subtasks.map(st=>`<div class="subtask-item"><div class="subtask-info"><span class="subtask-status" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${st.status==='completed'?'#10b981':'#f59e0b'};margin-right:8px;"></span> ${st.title} <span class="badge-s">${st.status||'pending'}</span></div><button class="btn btn-o btn-sm view-subtask" data-id="${st.id}">View</button></div>`).join('') : '<div class="info-value">No subtasks.</div>'}
    </div>
  `;
  
  // Attach event listeners
  document.getElementById('addTimeToTaskBtn')?.addEventListener('click', async()=>{ 
    const mins=prompt('Enter minutes worked:'); 
    if(mins && !isNaN(parseInt(mins))){ 
      await DS.addTimeLog({taskId:task.id,userId:ST.user.id,lawFirmId:ST.user.lawFirmId,date:new Date().toISOString().slice(0,10),durationMinutes:parseInt(mins),billable:true,notes:''}); 
      ST.taskDetailModal=false; 
      render(); 
      setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100); 
    } 
  });
  
  document.querySelectorAll('.delete-time-log-task').forEach(btn=>btn.addEventListener('click', async(e)=>{ 
    e.stopPropagation(); 
    if(confirm('Delete this time entry?')){ 
      await DS.deleteTimeLog(btn.dataset.id); 
      ST.taskDetailModal=false; 
      render(); 
      setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100); 
    } 
  }));
  
  document.getElementById('addSubtaskBtn')?.addEventListener('click', async()=>{ 
    const title=prompt('Subtask title:'); 
    if(title){ 
      await DS.addTask({title,parentTaskId:task.id,isSubTask:true,lawFirmId:ST.user.lawFirmId,status:'pending',priority:task.priority||'medium',createdById:ST.user.id}); 
      ST.taskDetailModal=false; 
      render(); 
      setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100); 
    } 
  });
  
  document.querySelectorAll('.view-subtask').forEach(btn=>btn.addEventListener('click', async()=>{ 
    const subtaskId=btn.dataset.id; 
    const subtask=allTasks.find(t=>t.id===subtaskId); 
    if(subtask){ 
      ST.selT=subtask; 
      ST.taskDetailModal=true; 
      render(); 
    } 
  }));
  
  document.getElementById('editTaskFromDetailBtn')?.addEventListener('click', () => {
    ST.taskDetailModal = false;
    ST.editTaskData = task;
    ST.modalMode = 'editTask';
    ST.modal = true;
    render();
  });
  
  document.getElementById('deleteTaskBtn')?.addEventListener('click', async()=>{ 
    if(confirm(`Delete task "${task.title}"? This will also delete all subtasks and time entries.`)){ 
      await DS.delTask(task.id); 
      ST.taskDetailModal=false; 
      ST.selT=null; 
      render(); 
    } 
  });
}

// Global functions
window.selectCase = async function(caseId){ const cases = await DS.cases(ST.user.lawFirmId); ST.selC = cases.find(c => c.id === caseId); ST.activeTab = 'overview'; ST.view = 'cases'; render(); };
window.openTaskDetail = async function(taskId){ const tasks = await DS.tasks(ST.user.lawFirmId); const task = tasks.find(t=>t.id===taskId); if(task){ ST.selT = task; ST.taskDetailModal = true; render(); } };

// Bind all event listeners
function bind(){
  document.getElementById('menu-btn')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('bd').classList.add('show');});
  document.getElementById('sb-close')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('bd').classList.remove('show');});
  document.getElementById('bd')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('bd').classList.remove('show');});
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');const f=document.getElementById('auth-form');if(this.dataset.tab==='login')f.innerHTML=lForm();else if(this.dataset.tab==='register')f.innerHTML=rForm();else f.innerHTML=jForm();bind();}));
  document.getElementById('login-btn')?.addEventListener('click',handleEmailLogin);
  document.getElementById('google-btn')?.addEventListener('click',handleGoogleLogin);
  document.getElementById('reg-btn')?.addEventListener('click',handleRegister);
  document.getElementById('join-btn')?.addEventListener('click',handleJoin);
  document.getElementById('lo-btn')?.addEventListener('click',async()=>{if(useFB)await auth.signOut();ST.user=null;render();});
  document.querySelectorAll('.nav-item[data-view]').forEach(item=>item.addEventListener('click',function(){ST.view=this.dataset.view;ST.selC=null;ST.selT=null;ST.modal=false;render();}));
  document.querySelectorAll('.case-tab').forEach(tab=>tab.addEventListener('click',function(){ST.activeTab=this.dataset.tab;render();}));
  document.getElementById('newCaseBtn')?.addEventListener('click',()=>{ST.modalMode='newCase';ST.modal=true;render();});
  document.getElementById('addHearingBtn')?.addEventListener('click',()=>{ST.modalMode='hearing';ST.modal=true;render();});
  document.getElementById('syncAllHearingsBtn')?.addEventListener('click',async()=>{if(ST.selC && ST.selC.hearings){for(let h of ST.selC.hearings){await syncToGoogleCalendar(ST.selC, h);}ST.suc='Hearings synced to calendar';render();}});
  document.getElementById('addUpdateBtn')?.addEventListener('click',async()=>{const input=document.getElementById('newUpdateInput');if(input && input.value.trim()){const updates=ST.selC.updates||[];updates.unshift({date:new Date().toISOString(),message:input.value.trim()});await DS.updCase(ST.selC.id,{updates});ST.selC.updates=updates;input.value='';render();}});
  document.getElementById('newTaskForCaseBtn')?.addEventListener('click',()=>{ST.modalMode='task';ST.modal=true;render();});
  document.getElementById('newTaskBtn')?.addEventListener('click',()=>{ST.modalMode='task';ST.modal=true;render();});
  document.getElementById('newTeamBtn')?.addEventListener('click',async()=>{const name=prompt('Team name:');if(name){await DS.addTeam({name,lawFirmId:ST.user.lawFirmId,memberIds:[]});render();}});
  document.getElementById('addTimeBtn')?.addEventListener('click',()=>{const taskId=prompt('Task ID:');const mins=parseInt(prompt('Minutes worked:'));if(taskId && mins){DS.addTimeLog({taskId,userId:ST.user.id,lawFirmId:ST.user.lawFirmId,date:new Date().toISOString().slice(0,10),durationMinutes:mins,billable:true,notes:''}).then(()=>render());}});
  document.getElementById('saveProfileBtn')?.addEventListener('click',async()=>{ST.user.firstName=document.getElementById('pfn')?.value;ST.user.lastName=document.getElementById('pln')?.value;ST.user.email=document.getElementById('pem')?.value;ST.user.phone=document.getElementById('pph')?.value;ST.user.hourlyRate=parseFloat(document.getElementById('phr')?.value||0);ST.user.description=document.getElementById('pde')?.value;await DS.sprofile(ST.user.id,ST.user);ST.suc='Profile updated!';render();});
  document.getElementById('taskFilter')?.addEventListener('change',function(){ST.filt.status=this.value;render();});
  document.querySelectorAll('.delete-team').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation();if(confirm('Delete this team?')){await DS.delTeam(btn.dataset.id);render();}}));
  document.querySelectorAll('.delete-time-log').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation();await DS.deleteTimeLog(btn.dataset.id);render();}));
  document.querySelectorAll('.sync-hearing').forEach(btn=>btn.addEventListener('click',async(e)=>{const idx=parseInt(btn.dataset.idx);const hearing=ST.selC.hearings[idx];await syncToGoogleCalendar(ST.selC,hearing);ST.suc='Hearing synced to calendar';render();}));
  document.querySelectorAll('.approve-btn').forEach(btn=>btn.addEventListener('click',async()=>{await DS.approveJoin(btn.dataset.uid);render();}));
  document.querySelectorAll('.reject-btn').forEach(btn=>btn.addEventListener('click',async()=>{await DS.rejectJoin(btn.dataset.uid);render();}));
  document.querySelectorAll('.view-case-client').forEach(btn=>btn.addEventListener('click',async()=>{const cases=await DS.cases(ST.user.lawFirmId);const c=cases.find(cx=>cx.id===btn.dataset.id);if(c){ST.selC=c;ST.activeTab='overview';ST.view='cases';render();}}));
  document.getElementById('closeModalBtn')?.addEventListener('click',()=>{ST.modal=false;render();});
  document.getElementById('modalCancelBtn')?.addEventListener('click',()=>{ST.modal=false;render();});
  document.getElementById('modalSaveBtn')?.addEventListener('click',async()=>{
    if(ST.modalMode === 'hearing'){
      const date=document.getElementById('hearingDate')?.value; const time=document.getElementById('hearingTime')?.value; const desc=document.getElementById('hearingDesc')?.value; const reminder=parseInt(document.getElementById('hearingReminder')?.value||30);

    } else if(ST.modalMode === 'task'){
      const title=document.getElementById('taskTitle')?.value; if(title){ const as=document.getElementById('taskAssignees'); await DS.addTask({title, description:document.getElementById('taskDesc')?.value, dueDate:document.getElementById('taskDue')?.value, priority:document.getElementById('taskPriority')?.value, status:document.getElementById('taskStatus')?.value, assigneeIds:as?Array.from(as.selectedOptions).map(o=>o.value):[], caseId:ST.selC?.id||null, lawFirmId:ST.user.lawFirmId, createdById:ST.user.id }); ST.modal=false; render(); }
    } else if(ST.modalMode === 'newCase'){
      const name=document.getElementById('caseName')?.value; if(name){ await DS.addCase({caseName:name, clientName:document.getElementById('clientName')?.value, caseRef:document.getElementById('caseRef')?.value, status:document.getElementById('caseStatus')?.value, details:document.getElementById('caseDetails')?.value, lawFirmId:ST.user.lawFirmId, hearings:[], updates:[] }); ST.modal=false; render(); }
    } else if(ST.modalMode === 'editTask' && ST.editTaskData){
      const title=document.getElementById('editTaskTitle')?.value; if(title){ const as=document.getElementById('editTaskAssignees'); const tags=document.getElementById('editTaskTags')?.value.split(',').map(s=>s.trim()).filter(Boolean); await DS.updTask(ST.editTaskData.id, { title, description:document.getElementById('editTaskDesc')?.value, dueDate:document.getElementById('editTaskDue')?.value, priority:document.getElementById('editTaskPriority')?.value, status:document.getElementById('editTaskStatus')?.value, caseId:document.getElementById('editTaskCase')?.value||null, assigneeIds:as?Array.from(as.selectedOptions).map(o=>o.value):[], tags:tags||[], notes:document.getElementById('editTaskNotes')?.value }); ST.modal=false; ST.editTaskData=null; render(); }
    }
  });
  document.getElementById('closeTaskModalBtn')?.addEventListener('click',()=>{ST.taskDetailModal=false;render();});
  document.getElementById('closeTaskModalFootBtn')?.addEventListener('click',()=>{ST.taskDetailModal=false;render();});
  document.getElementById('taskModalOverlay')?.addEventListener('click',function(e){if(e.target===this){ST.taskDetailModal=false;render();}});
}
// Authentication handlers
async function handleEmailLogin(){
  const em=document.getElementById('le')?.value; const pw=document.getElementById('lp')?.value;
  if(!em||!pw){ST.err='Fill all fields';render();return;}
  if(useFB){ try{ const cred=await auth.signInWithEmailAndPassword(em,pw); const p=await DS.uprofile(cred.user.uid); if(p){ST.user=p;ST.view='dashboard';render();} else{ST.err='Account not found';await auth.signOut();render();} }catch(err){ST.err=err.message;render();} }
  else{ const u=g(LS.U).find(x=>x.email===em&&x.password===pw); if(u){ST.user=u;ST.view='dashboard';render();} else{ST.err='Invalid credentials';render();} }
}
async function handleGoogleLogin(){if(!useFB)return;const prov=new firebase.auth.GoogleAuthProvider();try{const res=await auth.signInWithPopup(prov);const p=await DS.uprofile(res.user.uid);if(p){ST.user=p;ST.view='dashboard';render();}else{ST.err='No account linked';await auth.signOut();render();}}catch(err){ST.err=err.message;render();}}
async function handleRegister(){
  const fn=document.getElementById('rfn')?.value; const fi=document.getElementById('rfi')?.value; const la=document.getElementById('rla')?.value; const em=document.getElementById('re')?.value; const pw=document.getElementById('rp')?.value; const hr=parseFloat(document.getElementById('rhr')?.value||0);
  if(!fn||!fi||!la||!em||pw.length<6){ST.err='All fields required';render();return;}
  if(useFB){ try{ const cr=await auth.createUserWithEmailAndPassword(em,pw); const fid=DS.genId(); const profile={email:em,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr}; await DS.sprofile(cr.user.uid,profile); await DS.addFirm({firmId:fid,firmName:fn}); ST.user=profile; ST.suc='Firm created! ID: '+fid; render(); }catch(err){ST.err=err.message;render();} }
  else{ const fid=DS.genId(); const u={id:'U'+Date.now(),email:em,password:pw,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr}; const users=g(LS.U); users.push(u); s(LS.U,users); await DS.addFirm({firmId:fid,firmName:fn}); ST.user=u; ST.view='dashboard'; render(); }
}
async function handleJoin(){
  const fid=document.getElementById('jfi')?.value; const fi=document.getElementById('jfn')?.value; const la=document.getElementById('jln')?.value; const em=document.getElementById('je')?.value; const pw=document.getElementById('jp')?.value; const role=document.getElementById('jr')?.value; const hr=parseFloat(document.getElementById('jhr')?.value||0);
  if(!fid||!fi||!la||!em||pw.length<6){ST.err='All fields required';render();return;}
  const firm=await DS.findFirm(fid); if(!firm){ST.err='Firm not found';render();return;}
  if(useFB){ try{ const cr=await auth.createUserWithEmailAndPassword(em,pw); await DS.createJoinRequest(cr.user.uid,fid,{email:em,firstName:fi,lastName:la,role,hourlyRate:hr}); ST.suc='Join request sent!'; await auth.signOut(); render(); }catch(err){ST.err=err.message;render();} }
  else{ const uid='U'+Date.now(); await DS.createJoinRequest(uid,fid,{email:em,firstName:fi,lastName:la,role,password:pw,hourlyRate:hr}); ST.suc='Join request sent!'; ST.user=null; render(); }
}
render();
})();
