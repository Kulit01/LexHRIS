<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>LexHRIS – Philippine Law Firm Task Management</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif'],display:['Outfit','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <style>
    html{font-size:16px}
    body{font-family:'Inter',sans-serif;background-color:#f8fafc;color:#0f172a;-webkit-font-smoothing:antialiased;overscroll-behavior:contain;min-height:100vh;margin:0;padding:0}
    h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif;letter-spacing:-0.025em}
    .sidebar-transition{transition:transform 0.3s ease,width 0.3s ease}
    .sidebar-mobile{transform:translateX(-100%)}
    .sidebar-mobile.open{transform:translateX(0);z-index:70 !important}
    .sidebar-desktop-collapsed{width:5rem}
    .sidebar-desktop-collapsed .sidebar-text,.sidebar-desktop-collapsed .sidebar-role,.sidebar-desktop-collapsed .sidebar-firm-name,.sidebar-desktop-collapsed .sidebar-user-details{display:none}
    .sidebar-desktop-collapsed .sidebar-item{justify-content:center;padding-left:0;padding-right:0}
    .overlay{background-color:rgba(15,23,42,0.5);backdrop-filter:blur(4px)}
    .modal-overlay{background-color:rgba(15,23,42,0.6);backdrop-filter:blur(4px)}
    .toast{animation:slideIn 0.3s ease,fadeOut 0.3s ease 2.7s forwards}
    @keyframes slideIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
    .avatar-initials{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
    .scrollbar-thin::-webkit-scrollbar{width:4px}
    .scrollbar-thin::-webkit-scrollbar-track{background:transparent}
    .scrollbar-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
    .search-highlight{background-color:#fef3c7;padding:0 2px;border-radius:2px}
    #app-header{z-index:60;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px)}
    .chat-room-item.active-room{background-color:#f1f5f9;border-left:3px solid #f59e0b}
    .user-checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.5rem}
    .chat-msg-right{display:flex;justify-content:flex-end}
    .chat-msg-right .chat-bubble{background-color:#f59e0b;color:#0f172a;border-radius:16px 16px 4px 16px}
    .chat-msg-left .chat-bubble{background-color:#f1f5f9;color:#0f172a;border-radius:16px 16px 16px 4px}
    @media(max-width:767px){.chat-sidebar-mobile{position:absolute;z-index:10;height:100%;transform:translateX(-100%);transition:transform 0.3s ease}.chat-sidebar-mobile.open{transform:translateX(0)}}
    #app-container{min-height:100vh}
    @media(min-width:1024px){#app-container{max-height:100vh;overflow:hidden}}
    @media(max-width:1023px){#app-container{overflow-y:auto}}
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

<div id="toast-container" class="fixed top-4 right-4 sm:top-6 sm:right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

<div id="auth-container" class="min-h-screen flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">

      <div class="bg-amber-500 p-3 rounded-xl inline-flex mb-4 shadow-lg shadow-amber-500/30"><svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="M7 21h10"></path><path d="M12 3v18"></path><path d="M3 7h18"></path></svg></div>

        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Email</label><input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="attorney@lawfirm.ph"></div>

        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Law Firm ID <span class="text-slate-400">(to join existing)</span></label><input type="text" id="reg-firm-id" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="LEX-XXXX"></div>
        <button type="submit" id="reg-btn" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 rounded-xl text-sm font-bold mt-2">Register</button>
      </form>
    </div>
  </div>
</div>

<script>
(function(){
  const firebaseConfig={apiKey:"AIzaSyCfp5qv6QCa54px38JlDpoTu9uP4IUfCbc",authDomain:"lexhris-dcc4c.firebaseapp.com",projectId:"lexhris-dcc4c",storageBucket:"lexhris-dcc4c.firebasestorage.app",messagingSenderId:"840222259015",appId:"1:840222259015:web:43fd684b9bdf5ef43e7e62"};
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();
  const db=firebase.firestore();

  // LOCAL persistence – keeps user signed in after refresh / tab close
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  const PT=[{v:'todo',l:'To Do'},{v:'in_progress',l:'In Progress'},{v:'review',l:'Review'},{v:'done',l:'Done'}];
  const PC=[{v:'active',l:'Active'},{v:'pending',l:'Pending'},{v:'closed',l:'Closed'},{v:'archived',l:'Archived'}];

  const gi=()=>'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  const gfi=()=>{let i='LEX-';for(let j=0;j<5;j++)i+='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'.charAt(Math.floor(Math.random()*30));return i};
  const ifn=n=>{if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase()};
  const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
  const hl=(t,q)=>{if(!q||!t)return esc(t);const eq=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const r=new RegExp(`(${eq})`,'gi');return esc(t).replace(r,'<span class="search-highlight">$1</span>')};
  const fdt=d=>{try{if(d&&d.toDate)d=d.toDate();return new Date(d).toLocaleString('en-PH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return d}};
  const tst=(m,tp='info')=>{const c=document.getElementById('toast-container');const cl={success:'bg-emerald-500',error:'bg-rose-500',info:'bg-slate-900'};const e=document.createElement('div');e.className='toast px-5 py-3 rounded-xl shadow-xl text-sm font-semibold text-white pointer-events-auto '+cl[tp];e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),3000)};
  const om=html=>{document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden')};
  const cm=()=>{document.getElementById('modal-overlay').classList.add('hidden');document.getElementById('modal-content').innerHTML=''};
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)cm()});document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});

  const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');
  let mo=false,dc=false;
  document.getElementById('btn-toggle-sidebar').addEventListener('click',()=>{if(window.matchMedia('(min-width:1024px)').matches){dc=!dc;sb.classList.toggle('sidebar-desktop-collapsed',dc)}else{mo?clm():opm()}});
  document.getElementById('btn-close-sidebar-mobile').addEventListener('click',clm);ov.addEventListener('click',clm);
  function opm(){sb.classList.add('open');ov.classList.remove('hidden');mo=true}
  function clm(){sb.classList.remove('open');ov.classList.add('hidden');mo=false}
  window.addEventListener('resize',()=>{if(window.matchMedia('(min-width:1024px)').matches&&mo)clm()});

  let cud=null,fc=[],uc=[],tc=[],cc=[],tmc=[],clc=[],dcb=[];

  const DEFAULT_BILLING_TEMPLATE = `
    <div style="font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px;">
      <p style="text-align: right;">{{date}}</p>
      <h1 style="text-align: center; text-decoration: underline;">BILLING STATEMENT</h1>
      <p><strong>{{clientName}}</strong></p>
      <p>{{clientAddress}}</p>
      <h2 style="text-decoration: underline;">PARTICULARS</h2>
      <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <thead>
          <tr style="background-color: #f2f2f2;">
            <th style="border: 1px solid #ddd; padding: 8px;">Date</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Description</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Reference</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Amount</th>
          </tr>
        </thead>
        <tbody>
          {{billingRows}}
        </tbody>
      </table>
      <p style="font-weight: bold; text-align: right;">Total: {{total}}</p>
      <p style="font-size: 0.9em;">Should you find it more convenient to pay through check, kindly indicate "<strong>{{firmName}}</strong>" as payee. If opted through bank transfer, the payment may be made to the firm's Metrobank Account with Account No. <strong><u>522-7-522-91119-0</u></strong>.</p>
      <blockquote style="font-style: italic; color: #555;">Note: Please be advised that the Firm is not subject to withholding tax under Sec. 26, Chapter III of the National Internal Revenue Code.</blockquote>
      <p style="margin-top: 40px;">For the Firm:</p>
      <p><strong>ATTY. FREDRICK RODEL V. ATIENZA</strong></p>
      <p><em>Partner</em></p>
    </div>
  `;

  function gmts(){const f=fc[0];const c=f?.taskStatuses||[];const m=[...PT];c.forEach(c=>{if(!m.find(s=>s.v===c.v))m.push(c)});return m}
  function gmcs(){const f=fc[0];const c=f?.caseStatuses||[];const m=[...PC];c.forEach(c=>{if(!m.find(s=>s.v===c.v))m.push(c)});return m}
  const pbd=p=>`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${p==='high'?'bg-amber-100 text-amber-600':p==='urgent'?'bg-rose-100 text-rose-600':'bg-slate-100 text-slate-600'}">${p}</span>`;
  const sbd=(s,tp)=>{if(tp==='task'){const a=gmts();const f=a.find(x=>x.v===s);const l=f?f.l:s;const cs={todo:'bg-slate-100 text-slate-600',in_progress:'bg-amber-100 text-amber-600',review:'bg-blue-100 text-blue-600',done:'bg-emerald-100 text-emerald-600'};return`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${cs[s]||'bg-slate-100 text-slate-600'}">${l}</span>`}if(tp==='case'){const a=gmcs();const f=a.find(x=>x.v===s);const l=f?f.l:s;const cs={active:'bg-emerald-100 text-emerald-600',pending:'bg-amber-100 text-amber-600',closed:'bg-slate-100 text-slate-600',archived:'bg-slate-200 text-slate-500'};return`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${cs[s]||'bg-slate-100 text-slate-600'}">${l}</span>`}return''};
  const avh=(u,sz='w-10 h-10')=>u?.profilePhoto?`<img src="${esc(u.profilePhoto)}" class="${sz} rounded-full object-cover">`:`<span class="avatar-initials bg-amber-500 ${sz}">${ifn(u?.name)}</span>`;

  const totalBilling = (billings) => (billings||[]).reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const renderBillingList = (billings=[]) => {
    if(!billings.length) return '<p class="text-xs text-slate-400">No billing entries yet.</p>';
    return billings.map((b,i)=>`<div class="flex items-center gap-2 text-xs p-2 bg-slate-50 rounded-lg"><span class="font-semibold text-emerald-600">₱${parseFloat(b.amount).toLocaleString()}</span><span>${esc(b.description||'')}</span><span class="text-slate-400 ml-auto">${b.date||''}</span><button class="remove-billing-btn text-rose-400 p-1" data-index="${i}">✕</button></div>`).join('');
  };

  function fillTemplate(template, data) {
    return template.replace(/\{\{(\w+)\}\}/g, (match, key) => {
      return data[key] !== undefined ? esc(data[key]) : match;
    });
  }

  function getUnpaidAmount(b) {
    const amount = parseFloat(b.amount) || 0;
    if (b.status === 'paid') return 0;
    if (b.status === 'partial') {
      const partials = b.partialPayments || [];
      const paidSum = partials.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
      return amount - paidSum;
    }
    return amount;
  }

  async function deleteBilling(parentType, parentId, billingId) {
    if (parentType === 'client') {
      try {
        if (!confirm('Delete this billing entry?')) return;
        await db.collection('clientBillings').doc(billingId).delete();
        dcb = dcb.filter(b => b.id !== billingId);
        tst('Billing deleted.', 'info');
        return true;
      } catch(e) {
        console.error(e);
        tst('Failed to delete billing.', 'error');
        return false;
      }
    }
    
    const col = parentType === 'task' ? 'tasks' : 'cases';
    try {
      if (!confirm('Delete this billing entry?')) return false;
      const docRef = db.collection(col).doc(parentId);
      const docSnap = await docRef.get();
      if (!docSnap.exists) return tst('Item not found.', 'error');
      const data = docSnap.data();
      const billings = (data.billings || []).filter(b => b.id !== billingId);
      await docRef.update({ billings });
      
      if (parentType === 'task') {
        const t = tc.find(x => x.id === parentId);
        if (t) t.billings = billings;
      } else {
        const c = cc.find(x => x.id === parentId);
        if (c) c.billings = billings;
      }
      tst('Billing deleted.', 'info');
      return true;
    } catch (e) {
      console.error(e);
      tst('Failed to delete billing.', 'error');
      return false;
    }
  }

  async function wfud(uid){for(let i=0;i<10;i++){const snap=await db.collection('users').doc(uid).get();if(snap.exists){const data=snap.data();if(data.approved===true)return{...data,id:uid};if(data.approved===false)throw new Error('Your account is pending approval.')}await new Promise(r=>setTimeout(r,1000))}throw new Error('Could not load your account.')}

  async function lad(uid){

  // ---------------------- DIRECT CLIENT BILLING ----------------------

  async function addClientBilling(cid, amount, description, date) {
    const billing = {
      id: gi(),
      clientProfileId: cid,
      firmId: cud.firmId,
      amount: amount,
      description: description,
      date: date,
      status: 'pending',
      partialPayments: [],
      createdAt: new Date().toISOString()
    };
    await db.collection('clientBillings').add(billing);
    dcb.push({...billing, parentType: 'client', parentTitle: 'General Billing'});
    return billing;
  }

  async function addPartialPayment(billingId, parentType, parentId, amount, date) {
    if (parentType === 'client') {
      const docRef = db.collection('clientBillings').doc(billingId);
      const payment = { id: gi(), amount: amount, date: date };
      const doc = await docRef.get();
      if (!doc.exists) return tst('Billing not found.', 'error');
      const data = doc.data();
      const partials = data.partialPayments || [];
      partials.push(payment);
      await docRef.update({ partialPayments: partials, status: 'partial' });
      const idx = dcb.findIndex(b => b.id === billingId);
      if (idx >= 0) {
        dcb[idx].partialPayments = partials;
        dcb[idx].status = 'partial';
      }
      tst('Partial payment recorded.', 'success');
      return;
    }
    const col = parentType === 'task' ? 'tasks' : 'cases';
    const docRef = db.collection(col).doc(parentId);
    const doc = await docRef.get();
    if (!doc.exists) return tst('Item not found.', 'error');
    const data = doc.data();
    const billings = data.billings || [];
    const idx = billings.findIndex(b => b.id === billingId);
    if (idx === -1) return tst('Billing entry not found.', 'error');
    const partials = billings[idx].partialPayments || [];
    partials.push({ id: gi(), amount: amount, date: date });
    billings[idx].partialPayments = partials;
    billings[idx].status = 'partial';
    await docRef.update({ billings });
    if (parentType === 'task') {
      const t = tc.find(x => x.id === parentId);
      if (t) t.billings = billings;
    } else {
      const c = cc.find(x => x.id === parentId);
      if (c) c.billings = billings;
    }
    tst('Partial payment recorded.', 'success');
  }

  async function updateBillingEntry(parentType, parentId, billingId, newStatus, paidAmount = null) {
    if (parentType === 'client') {
      try {
        const docRef = db.collection('clientBillings').doc(billingId);
        const updateData = { status: newStatus };
        await docRef.update(updateData);
        const idx = dcb.findIndex(b => b.id === billingId);
        if (idx >= 0) {
          dcb[idx].status = newStatus;
        }
        tst(`Billing updated.`, 'success');
      } catch(e) {
        console.error(e);
        tst('Failed to update billing.', 'error');
      }
      return;
    }
    const col = parentType === 'task' ? 'tasks' : 'cases';
    try {
      const docRef = db.collection(col).doc(parentId);
      const docSnap = await docRef.get();
      if (!docSnap.exists) return tst('Item not found.','error');
      const data = docSnap.data();
      const billings = data.billings || [];
      const idx = billings.findIndex(b => b.id === billingId);
      if (idx === -1) return tst('Billing entry not found.','error');
      billings[idx].status = newStatus;
      await docRef.update({ billings });
      if (parentType === 'task') {
        const t = tc.find(x => x.id === parentId);
        if (t) t.billings = billings;
      } else {
        const c = cc.find(x => x.id === parentId);
        if (c) c.billings = billings;
      }
      tst(`Billing updated.`, 'success');
    } catch (e) {
      console.error(e);
      tst('Failed to update billing status.', 'error');
    }
  }

  function viewClientDetails(cid){
    const client = clc.find(c=>c.id===cid);
    if(!client) return;
    const linkedUser = client.linkedUserId ? uc.find(u=>u.id===client.linkedUserId) : null;
    const clientTasks = tc.filter(t=>t.clientProfileId===client.id && !t.parentTaskId);
    const clientCases = cc.filter(c=>c.clientProfileId===client.id);
    const isFinance = cud.role==='finance';
    const canManageBilling = isFinance || cud.role==='partner' || cud.role==='managing_partner';

    let allBillings = [];
    clientTasks.forEach(t=>{
      (t.billings||[]).forEach(b=>{
        allBillings.push({...b, parentType: 'task', parentId: t.id, parentTitle: t.title});
      });
    });
    clientCases.forEach(c=>{
      (c.billings||[]).forEach(b=>{
        allBillings.push({...b, parentType: 'case', parentId: c.id, parentTitle: c.title});
      });
    });

    const directClientBillings = dcb.filter(b => b.clientProfileId === cid);
    allBillings = allBillings.concat(directClientBillings.map(b => ({...b, parentType: 'client', parentId: b.id, parentTitle: 'General Billing'})));

    renderClientModal(client, allBillings, linkedUser, clientTasks, clientCases, isFinance, canManageBilling, cid);
  }

    if (canManageBilling) {
      document.getElementById('add-cb-btn').addEventListener('click', async () => {

        const desc = document.getElementById('cb-desc').value.trim();
        const date = document.getElementById('cb-date').value;
        if (!amount || parseFloat(amount) <= 0) return tst('Enter valid amount.', 'error');
        try {
          await addClientBilling(cid, amount, desc, date);
          cm();
          viewClientDetails(cid);
          tst('Billing added.', 'success');
        } catch(e) {
          tst('Failed to add billing.', 'error');
        }

      document.querySelectorAll('.delete-billing-btn').forEach(btn => {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          const billingId = this.dataset.billingId;
          const parentType = this.dataset.parentType;
          const parentId = this.dataset.parentId;
          if (await deleteBilling(parentType, parentId, billingId)) {
            cm();
            viewClientDetails(cid);

          const newStatus = this.value;
          if (newStatus === 'partial') {
            partialSection.style.display = 'block';
          } else {
            partialSection.style.display = 'none';
            updateBillingEntry(
              this.dataset.parentType,
              this.dataset.parentId,
              this.dataset.billingId,
              newStatus
            ).then(() => {
              cm();
              viewClientDetails(cid);

          select.closest('.billing-item').querySelector('.partial-payment-section').style.display = 'block';
        }
      });

      document.querySelectorAll('.add-partial-btn').forEach(btn => {

          const dateInput = billingItem.querySelector('.partial-date-input');
          const amount = parseFloat(amountInput.value);
          const date = dateInput.value;
          if (!amount || amount <= 0 || !date) return tst('Enter valid amount and date.', 'error');
          const billingId = billingItem.querySelector('.billing-status-select').dataset.billingId;
          const parentType = billingItem.querySelector('.billing-status-select').dataset.parentType;
          const parentId = billingItem.querySelector('.billing-status-select').dataset.parentId;
          await addPartialPayment(billingId, parentType, parentId, amount, date);
          cm();
          viewClientDetails(cid);
        });
      });

      document.querySelectorAll('.remove-partial-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          const partialId = this.dataset.partialId;
          const billingItem = this.closest('.billing-item');
          const billingId = billingItem.querySelector('.billing-status-select').dataset.billingId;
          const parentType = billingItem.querySelector('.billing-status-select').dataset.parentType;
          const parentId = billingItem.querySelector('.billing-status-select').dataset.parentId;
          if (!confirm('Remove this payment?')) return;
          if (parentType === 'client') {
            const docRef = db.collection('clientBillings').doc(billingId);
            const doc = await docRef.get();
            if (!doc.exists) return tst('Billing not found.', 'error');
            const data = doc.data();
            let partials = data.partialPayments || [];
            partials = partials.filter(p => p.id !== partialId);
            await docRef.update({ partialPayments: partials });
            const idx = dcb.findIndex(b => b.id === billingId);
            if (idx >= 0) {
              dcb[idx].partialPayments = partials;
              if (partials.length === 0) dcb[idx].status = 'pending';
            }
          } else {
            const col = parentType === 'task' ? 'tasks' : 'cases';
            const docRef = db.collection(col).doc(parentId);
            const doc = await docRef.get();
            if (!doc.exists) return tst('Item not found.', 'error');
            const data = doc.data();
            const billings = data.billings || [];
            const idx = billings.findIndex(b => b.id === billingId);
            if (idx !== -1) {
              let partials = billings[idx].partialPayments || [];
              partials = partials.filter(p => p.id !== partialId);
              billings[idx].partialPayments = partials;
              if (partials.length === 0) billings[idx].status = 'pending';
              await docRef.update({ billings });
              if (parentType === 'task') {
                const t = tc.find(x => x.id === parentId);
                if (t) t.billings = billings;
              } else {
                const c = cc.find(x => x.id === parentId);
                if (c) c.billings = billings;
              }
            }
          }
          cm();
          viewClientDetails(cid);
          tst('Payment removed.', 'info');
        });
      });

      document.getElementById('print-statement-btn').addEventListener('click', ()=>{
        const selected = [];
        document.querySelectorAll('#modal-content .billing-checkbox:checked').forEach(cb=>{
          const billingId = cb.dataset.billingId;
          const parentType = cb.dataset.parentType;
          const parentId = cb.dataset.parentId;
          const billing = allBillings.find(b => b.id === billingId && b.parentType === parentType && (b.parentId || b.id) === parentId);
          if (billing) selected.push({...billing, parentId: parentId});
        });
        if(selected.length===0) return tst('Select at least one billing to print.','error');
        printBillingStatement(client, selected);
      });
    }
  }

  // ---------------------- PRINT STATEMENT WITH TEMPLATE ----------------------
  function printBillingStatement(client, billings) {
    const total = billings.reduce((s,b)=>{
      const amount = parseFloat(b.amount)||0;
      if (b.status === 'paid') return s;
      const partials = b.partialPayments || [];
      const paidSum = partials.reduce((sum, p) => sum + (parseFloat(p.amount)||0), 0);
      return s + (amount - paidSum);
    },0);
    const firm = fc[0] || {};
    const firmName = firm.name || 'Law Firm';
    let template = firm.billingTemplate || '';

    const billingRowsHtml = billings.map(b => `
      <tr>
        <td>${b.date||''}</td>
        <td>${esc(b.description||'')}</td>
        <td>${esc(b.parentTitle||'')} (${b.parentType})</td>
        <td>₱${parseFloat(b.amount).toLocaleString()}</td>
      </tr>
    `).join('');

    if (template && !/<table/i.test(template)) {
      const fullTable = `<table style="width:100%; border-collapse: collapse; margin-top: 10px;">
        <thead>
          <tr style="background-color: #f2f2f2;">
            <th style="border: 1px solid #ddd; padding: 8px;">Date</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Description</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Reference</th>
            <th style="border: 1px solid #ddd; padding: 8px;">Amount</th>
          </tr>
        </thead>
        <tbody>
          ${billingRowsHtml}
        </tbody>
      </table>`;
      template = template.replace('{{billingRows}}', fullTable);
    } else if (template) {
      template = template.replace('{{billingRows}}', billingRowsHtml);
    } else {
      template = DEFAULT_BILLING_TEMPLATE.replace('{{billingRows}}', billingRowsHtml);
    }

    const data = {
      firmName: firmName,
      clientName: client.name,
      clientAddress: client.address || 'N/A',
      date: new Date().toLocaleDateString('en-PH', {year:'numeric', month:'long', day:'numeric'}),
      total: `₱${total.toLocaleString()}`
    };

    const printContent = fillTemplate(template, data);
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`<html><head><title>Billing Statement - ${esc(client.name)}</title></head><body>${printContent}</body></html>`);
    printWindow.document.close();
    printWindow.focus();
    printWindow.onafterprint = () => printWindow.close();
    printWindow.print();
  }

        sa();
      }catch(e){
        console.error(e);
        il=true;
        await auth.signOut();
        sh();
        tst(e.message||'Error loading data.','error');
      }
    }else{
      sh();
      il=true;
    }
  });

  document.getElementById('login-form').addEventListener('submit',async e=>{e.preventDefault();const em=document.getElementById('login-email').value.trim().toLowerCase();const pw=document.getElementById('login-password').value;try{await auth.signInWithEmailAndPassword(em,pw)}catch(err){tst(err.message,'error')}});
  document.getElementById('register-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const nm=document.getElementById('reg-name').value.trim();
    const em=document.getElementById('reg-email').value.trim().toLowerCase();
    const pw=document.getElementById('reg-password').value;
    const rl=document.getElementById('reg-role').value;
    const fnm=document.getElementById('reg-firm-name').value.trim();
    const fii=document.getElementById('reg-firm-id').value.trim().toUpperCase();
    try{
      const cred=await auth.createUserWithEmailAndPassword(em,pw);
      const uid=cred.user.uid;
      let fid=null,isf=false;
      if(rl==='client'){
        if(!fii)throw new Error('Enter Firm ID to join as client.');
        const snap=await db.collection('firms').doc(fii).get();
        if(!snap.exists)throw new Error('Firm ID not found.');
        fid=fii;
      }else if(fnm&&!fii){
        fid=gfi();
        let ex=await db.collection('firms').doc(fid).get();
        while(ex.exists){fid=gfi();ex=await db.collection('firms').doc(fid).get();}
        await db.collection('firms').doc(fid).set({
          id:fid, name:fnm, taskStatuses:[], caseStatuses:[],
          createdAt:new Date().toISOString(),
          billingTemplate: DEFAULT_BILLING_TEMPLATE
        });
        isf=true;
      }else if(fii&&!fnm){
        const snap=await db.collection('firms').doc(fii).get();
        if(!snap.exists)throw new Error('Firm ID not found.');
        fid=fii;
      }else throw new Error('Create new firm OR join existing.');

      const ud={
        id:uid, name:nm, email:em, firmId:fid,
        role:isf?'managing_partner':rl,
        contactNumber:'', description:'', profilePhoto:'',
        approved:isf, createdAt:new Date().toISOString()
      };
      await db.collection('users').doc(uid).set(ud);
      if(isf){
        await new Promise(r=>setTimeout(r,2000));
        il=false;
        await lad(uid);
        sa();
        tst(`Firm "${fnm}" created! ID: ${fid}`,'success');
      }else{
        await auth.signOut();
        swl();
        tst('Registration submitted. Waiting for approval.','info');
      }
    }catch(err){tst(err.message,'error')}
  });
  document.getElementById('btn-logout').addEventListener('click',()=>auth.signOut());

  function swl(){document.getElementById('login-form').classList.remove('hidden');document.getElementById('register-form').classList.add('hidden')}
  function swr(){document.getElementById('login-form').classList.add('hidden');document.getElementById('register-form').classList.remove('hidden')}
  document.getElementById('tab-login').addEventListener('click',swl);document.getElementById('tab-register').addEventListener('click',swr);

  window.cm=cm;

  if(!auth.currentUser) sh();
})();
</script>
</body>
</html>
