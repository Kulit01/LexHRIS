<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>LexHRIS - Philippine Law Firm Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui','sans-serif'],display:['Outfit','ui-sans-serif','system-ui','sans-serif']}}}}</script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <style>
    html{font-size:16px}
    body{font-family:'Inter',sans-serif;background-color:#f8fafc;color:#0f172a;-webkit-font-smoothing:antialiased;overscroll-behavior:contain;min-height:100vh}
    h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif;letter-spacing:-0.025em}
    .sidebar-transition{transition:transform 0.3s ease,width 0.3s ease}
    .sidebar-mobile{transform:translateX(-100%)}
    .sidebar-mobile.open{transform:translateX(0);z-index:70 !important}
    .sidebar-desktop-collapsed{width:5rem}
    .sidebar-desktop-collapsed .sidebar-text,.sidebar-desktop-collapsed .sidebar-role,.sidebar-desktop-collapsed .sidebar-firm-name,.sidebar-desktop-collapsed .sidebar-user-details{display:none}
    .sidebar-desktop-collapsed .sidebar-item{justify-content:center;padding-left:0;padding-right:0}
    .overlay{background-color:rgba(15,23,42,0.5);backdrop-filter:blur(4px)}
    .modal-overlay{background-color:rgba(15,23,42,0.6);backdrop-filter:blur(4px)}
    .toast{animation:slideIn 0.3s ease,fadeOut 0.3s ease 2.7s forwards}
    @keyframes slideIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
    .avatar-initials{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
    .scrollbar-thin::-webkit-scrollbar{width:4px}
    .scrollbar-thin::-webkit-scrollbar-track{background:transparent}
    .scrollbar-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
    .search-highlight{background-color:#fef3c7;padding:0 2px;border-radius:2px}
    #app-header{z-index:60;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px)}
    .chat-room-item.active-room{background-color:#f1f5f9;border-left:3px solid #f59e0b}
    .user-checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.5rem}
    .chat-msg-right{display:flex;justify-content:flex-end}
    .chat-msg-right .chat-bubble{background-color:#f59e0b;color:#0f172a;border-radius:16px 16px 4px 16px}
    .chat-msg-left .chat-bubble{background-color:#f1f5f9;color:#0f172a;border-radius:16px 16px 16px 4px}
    @media(max-width:767px){.chat-sidebar-mobile{position:absolute;z-index:10;height:100%;transform:translateX(-100%);transition:transform 0.3s ease}.chat-sidebar-mobile.open{transform:translateX(0)}}
    #app-container{min-height:100vh}
    @media(min-width:1024px){#app-container{max-height:100vh;overflow:hidden}}
    @media(max-width:1023px){#app-container{overflow-y:auto}}
  </style>

<!-- PWA Manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker registered'))
      .catch(err => console.error('Service Worker registration failed:', err));
  }
</script>

</head>
<body class="bg-slate-50 text-slate-900">

<div id="toast-container" class="fixed top-4 right-4 sm:top-6 sm:right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

<!-- Auth Container -->
<div id="auth-container" class="min-h-screen flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <div class="bg-amber-500 p-3 rounded-xl inline-flex mb-4 shadow-lg shadow-amber-500/30"><svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="M7 21h10"></path><path d="M12 3v18"></path><path d="M3 7h18"></path></svg></div>
      <h1 class="text-3xl font-bold text-slate-900">LexHRIS</h1><p class="text-slate-500 mt-1">Philippine Law Firm Management</p>
    </div>
    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm max-h-[80vh] overflow-y-auto scrollbar-thin">
      <div class="flex gap-2 mb-6 bg-slate-100 rounded-xl p-1">
        <button id="tab-login" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-slate-900 shadow-sm">Login</button>
        <button id="tab-register" class="flex-1 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:text-slate-700">Register</button>
      </div>
      <form id="login-form" class="space-y-4">
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Email</label><input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="attorney@lawfirm.ph"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Password</label><input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="••••••••"></div>
        <button type="submit" id="login-btn" class="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-sm font-bold mt-2">Sign In</button>
      </form>
      <form id="register-form" class="space-y-3 hidden">
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Full Name</label><input type="text" id="reg-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="Atty. Juan Dela Cruz"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Email</label><input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="attorney@lawfirm.ph"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Password</label><input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="Min. 6 characters"></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Role</label><select id="reg-role" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-white"><option value="paralegal">Paralegal</option><option value="associate">Associate</option><option value="partner">Partner</option><option value="managing_partner">Managing Partner</option><option value="client">Client</option></select></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Law Firm Name <span class="text-amber-500">(New Firm)</span></label><input type="text" id="reg-firm-name" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="Dela Cruz & Associates"><p class="text-[10px] text-slate-400 mt-1">Leave blank and enter a Firm ID below to join an existing firm.</p></div>
        <div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Law Firm ID <span class="text-slate-400">(to join existing)</span></label><input type="text" id="reg-firm-id" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" placeholder="LEX-XXXX"></div>
        <button type="submit" id="reg-btn" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 rounded-xl text-sm font-bold mt-2">Register</button>
      </form>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app-container" class="flex overflow-hidden relative bg-slate-50">
  <div id="sidebar-overlay" class="fixed inset-0 z-30 overlay hidden lg:hidden"></div>
  <aside id="sidebar" class="sidebar-transition fixed lg:sticky inset-y-0 left-0 z-40 w-64 bg-slate-900 text-white flex flex-col flex-shrink-0 shadow-2xl transform -translate-x-full lg:translate-x-0 sidebar-mobile" style="top:0; bottom:0;">
    <div class="p-5 border-b border-slate-700/50 flex items-center justify-between">
      <div class="flex items-center gap-3 flex-shrink-0"><div class="bg-amber-500 p-2 rounded-lg inline-flex"><svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="M7 21h10"></path><path d="M12 3v18"></path><path d="M3 7h18"></path></svg></div><div class="sidebar-text"><h2 class="text-sm font-bold text-white">LexHRIS</h2><p id="sidebar-firm-name" class="text-[10px] text-slate-400">Law Firm</p></div></div>
      <button id="btn-close-sidebar-mobile" class="lg:hidden text-slate-400 hover:text-white p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <nav id="sidebar-nav" class="flex-1 p-3 space-y-1 overflow-y-auto scrollbar-thin"></nav>
    <div class="p-4 border-t border-slate-700/50 sidebar-user-details">
      <div class="flex items-center gap-3 mb-3"><div id="sidebar-avatar" class="avatar-initials bg-amber-500 w-10 h-10 text-xs">U</div><div class="flex-1 min-w-0"><p id="sidebar-username" class="text-sm font-semibold text-white truncate">User</p><p id="sidebar-role" class="text-[10px] text-slate-400 capitalize">role</p></div></div>
      <button id="btn-logout" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold">Sign Out</button>
    </div>
  </aside>
  <main class="flex-1 overflow-y-auto scrollbar-thin w-full">
    <div id="app-header" class="sticky top-0 border-b border-slate-200 p-3 sm:p-4 flex items-center gap-3 sm:gap-4">
      <button id="btn-toggle-sidebar" class="text-slate-700 hover:text-slate-900 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
      <h1 class="text-lg font-bold text-slate-900">LexHRIS</h1>
    </div>
    <div id="view-dashboard" class="p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-tasks" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-cases" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-chat" class="hidden h-full flex flex-col md:flex-row" style="max-height:calc(100vh - 65px);"></div>
    <div id="view-teams" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-approvals" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-users" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-7xl mx-auto"></div>
    <div id="view-profile" class="hidden p-3 sm:p-4 md:p-6 lg:p-8 max-w-3xl mx-auto"></div>
  </main>
</div>

<div id="modal-overlay" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
  <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-4 sm:p-6 scrollbar-thin"></div>
</div>

<script>
(async function(){
  // Firebase config
  const firebaseConfig={apiKey:"AIzaSyCfp5qv6QCa54px38JlDpoTu9uP4IUfCbc",authDomain:"lexhris-dcc4c.firebaseapp.com",projectId:"lexhris-dcc4c",storageBucket:"lexhris-dcc4c.firebasestorage.app",messagingSenderId:"840222259015",appId:"1:840222259015:web:43fd684b9bdf5ef43e7e62"};
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();
  const db=firebase.firestore();

  // Ensure session persistence before we listen to auth changes
  await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

  // ---- Global constants & helpers ----
  const PT=[{v:'todo',l:'To Do'},{v:'in_progress',l:'In Progress'},{v:'review',l:'Review'},{v:'done',l:'Done'}];
  const PC=[{v:'active',l:'Active'},{v:'pending',l:'Pending'},{v:'closed',l:'Closed'},{v:'archived',l:'Archived'}];

  const gi=()=>'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  const gfi=()=>{let i='LEX-';for(let j=0;j<5;j++)i+='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'.charAt(Math.floor(Math.random()*30));return i};
  const ifn=n=>{if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase()};
  const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
  const hl=(t,q)=>{if(!q||!t)return esc(t);const eq=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const r=new RegExp(`(${eq})`,'gi');return esc(t).replace(r,'<span class="search-highlight">$1</span>')};
  const fdt=d=>{try{if(d&&d.toDate)d=d.toDate();return new Date(d).toLocaleString('en-PH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return d}};
  const tst=(m,tp='info')=>{const c=document.getElementById('toast-container');const cl={success:'bg-emerald-500',error:'bg-rose-500',info:'bg-slate-900'};const e=document.createElement('div');e.className='toast px-5 py-3 rounded-xl shadow-xl text-sm font-semibold text-white pointer-events-auto '+cl[tp];e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),3000)};
  const om=html=>{document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden')};
  const cm=()=>{document.getElementById('modal-overlay').classList.add('hidden');document.getElementById('modal-content').innerHTML=''};
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)cm()});document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});

  const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');
  let mo=false,dc=false;
  document.getElementById('btn-toggle-sidebar').addEventListener('click',()=>{if(window.matchMedia('(min-width:1024px)').matches){dc=!dc;sb.classList.toggle('sidebar-desktop-collapsed',dc)}else{mo?clm():opm()}});
  document.getElementById('btn-close-sidebar-mobile').addEventListener('click',clm);ov.addEventListener('click',clm);
  function opm(){sb.classList.add('open');ov.classList.remove('hidden');mo=true}
  function clm(){sb.classList.remove('open');ov.classList.add('hidden');mo=false}
  window.addEventListener('resize',()=>{if(window.matchMedia('(min-width:1024px)').matches&&mo)clm()});

  let cud=null,fc=[],uc=[],tc=[],cc=[],tmc=[];

  function gmts(){const f=fc[0];const c=f?.taskStatuses||[];const m=[...PT];c.forEach(c=>{if(!m.find(s=>s.v===c.v))m.push(c)});return m}
  function gmcs(){const f=fc[0];const c=f?.caseStatuses||[];const m=[...PC];c.forEach(c=>{if(!m.find(s=>s.v===c.v))m.push(c)});return m}
  const pbd=p=>`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${p==='high'?'bg-amber-100 text-amber-600':p==='urgent'?'bg-rose-100 text-rose-600':'bg-slate-100 text-slate-600'}">${p}</span>`;
  const sbd=(s,tp)=>{if(tp==='task'){const a=gmts();const f=a.find(x=>x.v===s);const l=f?f.l:s;const cs={todo:'bg-slate-100 text-slate-600',in_progress:'bg-amber-100 text-amber-600',review:'bg-blue-100 text-blue-600',done:'bg-emerald-100 text-emerald-600'};return`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${cs[s]||'bg-slate-100 text-slate-600'}">${l}</span>`}if(tp==='case'){const a=gmcs();const f=a.find(x=>x.v===s);const l=f?f.l:s;const cs={active:'bg-emerald-100 text-emerald-600',pending:'bg-amber-100 text-amber-600',closed:'bg-slate-100 text-slate-600',archived:'bg-slate-200 text-slate-500'};return`<span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${cs[s]||'bg-slate-100 text-slate-600'}">${l}</span>`}return''};
  const avh=(u,sz='w-10 h-10')=>u?.profilePhoto?`<img src="${esc(u.profilePhoto)}" class="${sz} rounded-full object-cover">`:`<span class="avatar-initials bg-amber-500 ${sz}">${ifn(u?.name)}</span>`;

  async function wfud(uid){for(let i=0;i<10;i++){const snap=await db.collection('users').doc(uid).get();if(snap.exists){const data=snap.data();if(data.approved===true)return{...data,id:uid};if(data.approved===false)throw new Error('Your account is pending approval.')}await new Promise(r=>setTimeout(r,1000))}throw new Error('Could not load your account. Please try again later.')}

  async function lad(uid){cud=await wfud(uid);const fid=cud.firmId;if(!fid)throw new Error('Account missing firm ID.');const sf=await db.collection('firms').doc(fid).get();fc=sf.exists?[sf.data()]:[];const su=await db.collection('users').where('firmId','==',fid).get();uc=su.docs.map(d=>({...d.data(),id:d.id}));const st=await db.collection('tasks').where('firmId','==',fid).get();tc=st.docs.map(d=>({...d.data(),id:d.id}));const sc=await db.collection('cases').where('firmId','==',fid).get();cc=sc.docs.map(d=>({...d.data(),id:d.id}));const stm=await db.collection('teams').where('firmId','==',fid).get();tmc=stm.docs.map(d=>({...d.data(),id:d.id}))}

  // ---- UI rendering functions ----

  function sh(){document.getElementById('auth-container').classList.remove('hidden');document.getElementById('app-container').classList.add('hidden');}
  function sa(){document.getElementById('auth-container').classList.add('hidden');document.getElementById('app-container').classList.remove('hidden');rs();us();sv('dashboard');}

  function rs(){const u=cud;const cl=u.role==='client';const isPartnerOrMP=u.role==='partner'||u.role==='managing_partner';document.getElementById('sidebar-nav').innerHTML=`
    <button data-view="dashboard" class="sidebar-item active w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 flex items-center gap-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="sidebar-text">Dashboard</span></button>
    <button data-view="tasks" class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 flex items-center gap-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg><span class="sidebar-text">Tasks</span></button>
    <button data-view="cases" class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 flex items-center gap-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg><span class="sidebar-text">Cases</span></button>
    <button data-view="chat" class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 flex items-center gap-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="sidebar-text">Chat</span></button>
    ${!cl?`
    <button data-view="teams" class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 flex items-center gap-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="sidebar-text">Teams</span></button>

  document.getElementById('btn-add-team').addEventListener('click',()=>openNewTeamModal());
  if(canEdit){document.querySelectorAll('.edit-team-btn').forEach(btn=>btn.addEventListener('click',function(){editTeam(this.dataset.teamId)}));}}
  function openNewTeamModal(){const users=uc.filter(u=>u.approved);const checkboxes=users.map(u=>`<label class="flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 cursor-pointer"><input type="checkbox" value="${u.id}" class="rounded border-slate-300 text-amber-500"><span class="text-sm">${esc(u.name)}</span></label>`).join('');om(`<h3 class="text-lg sm:text-xl font-bold mb-4">Create New Team</h3><form id="add-team-form" class="space-y-4"><div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Team Name</label><input type="text" id="team-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm"></div><div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Members</label><div class="max-h-48 overflow-y-auto border border-slate-200 rounded-xl p-3 space-y-1">${checkboxes}</div></div><div class="flex gap-3 pt-2"><button type="submit" class="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 rounded-xl text-sm font-bold">Create</button><button type="button" onclick="cm()" class="px-6 py-3 bg-slate-100 rounded-xl text-sm">Cancel</button></div></form>`);document.getElementById('add-team-form').addEventListener('submit',async function(e){e.preventDefault();const name=document.getElementById('team-name').value.trim();const members=Array.from(document.querySelectorAll('#add-team-form input[type="checkbox"]:checked')).map(cb=>cb.value);const td={name,members,firmId:cud.firmId,createdAt:new Date().toISOString()};const ref=await db.collection('teams').add(td);td.id=ref.id;tmc.push(td);cm();rtmv();tst('Team created!','success')});}
  function editTeam(tid){const team=tmc.find(t=>t.id===tid);if(!team)return;const users=uc.filter(u=>u.approved);const checkboxes=users.map(u=>`<label class="flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 cursor-pointer"><input type="checkbox" value="${u.id}" ${(team.members||[]).includes(u.id)?'checked':''} class="rounded border-slate-300 text-amber-500"><span class="text-sm">${esc(u.name)}</span></label>`).join('');om(`<h3 class="text-lg sm:text-xl font-bold mb-4">Edit Team</h3><form id="edit-team-form" class="space-y-4"><input type="hidden" id="edit-team-id" value="${tid}"><div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Team Name</label><input type="text" id="edit-team-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" value="${esc(team.name)}"></div><div><label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Members</label><div class="max-h-48 overflow-y-auto border border-slate-200 rounded-xl p-3 space-y-1">${checkboxes}</div></div><div class="flex gap-3 pt-2"><button type="submit" class="flex-1 py-3 bg-slate-900 text-white rounded-xl text-sm font-bold">Save Changes</button><button type="button" onclick="cm()" class="px-6 py-3 bg-slate-100 rounded-xl text-sm">Cancel</button></div></form>`);document.getElementById('edit-team-form').addEventListener('submit',async function(e){e.preventDefault();const id=document.getElementById('edit-team-id').value;const name=document.getElementById('edit-team-name').value.trim();const members=Array.from(document.querySelectorAll('#edit-team-form input[type="checkbox"]:checked')).map(cb=>cb.value);const idx=tmc.findIndex(t=>t.id===id);if(idx>=0){tmc[idx].name=name;tmc[idx].members=members;await db.collection('teams').doc(id).update({name,members});cm();rtmv();tst('Team updated.','success');}});}

  // ---- Approvals ----
  function rap(){const u=cud;if(!u||u.role==='client'||!(u.role==='managing_partner'||u.role==='partner')){document.getElementById('view-approvals').innerHTML=`<header class="mb-4 sm:mb-6"><h1 class="text-xl sm:text-2xl md:text-3xl font-bold">Approvals</h1></header><div class="bg-white p-10 rounded-2xl border text-center"><p class="text-slate-500">No approval privileges.</p></div>`;return}const pd=uc.filter(u=>u.firmId===cud.firmId&&!u.approved);document.getElementById('view-approvals').innerHTML=`<header class="mb-4 sm:mb-6"><h1 class="text-xl sm:text-2xl md:text-3xl font-bold">Approvals</h1></header><div class="space-y-3">${pd.length?pd.map(p=>`<div class="bg-white p-4 sm:p-5 rounded-2xl border flex items-center gap-3 sm:gap-4 flex-wrap sm:flex-nowrap">${avh(p,'w-10 h-10')}<div class="flex-1 min-w-0"><h4 class="text-sm font-semibold">${esc(p.name)}</h4><p class="text-xs text-slate-500">${esc(p.email)}</p></div><div class="flex gap-2"><button class="app-btn px-3 sm:px-4 py-2 bg-emerald-500 text-white rounded-xl text-xs" data-user-id="${p.id}">Approve</button><button class="rej-btn px-3 sm:px-4 py-2 bg-rose-100 text-rose-600 rounded-xl text-xs" data-user-id="${p.id}">Reject</button></div></div>`).join(''):'<div class="bg-white p-10 rounded-2xl border text-center"><p class="text-slate-500">No pending approvals</p></div>'}</div>`;document.querySelectorAll('.app-btn').forEach(b=>b.addEventListener('click',async function(){const uid=this.dataset.userId;await db.collection('users').doc(uid).update({approved:true});const idx=uc.findIndex(u=>u.id===uid);if(idx>=0)uc[idx].approved=true;rap();us();tst('User approved!','success')}));document.querySelectorAll('.rej-btn').forEach(b=>b.addEventListener('click',async function(){const uid=this.dataset.userId;await db.collection('users').doc(uid).delete();uc=uc.filter(u=>u.id!==uid);rap();us();tst('User rejected.','info')}))}

  // ---- Users management ----
  function ru(){const u=cud;if(!u||(u.role!=='partner'&&u.role!=='managing_partner')){document.getElementById('view-users').innerHTML='<div class="bg-white p-10 rounded-2xl border text-center"><p class="text-slate-500">You do not have access to manage users.</p></div>';return;}const firmUsers=uc.filter(u=>u.firmId===u.firmId&&u.approved);const roles=['paralegal','associate','partner','managing_partner','client'];document.getElementById('view-users').innerHTML=`<header class="mb-4 sm:mb-6"><h1 class="text-xl sm:text-2xl md:text-3xl font-bold">Users</h1><p class="text-slate-500 text-sm mt-1">Manage roles of approved firm members.</p></header><div class="space-y-3">${firmUsers.length?firmUsers.map(user=>`<div class="bg-white p-4 sm:p-5 rounded-2xl border flex items-center gap-3 sm:gap-4 flex-wrap sm:flex-nowrap">${avh(user,'w-10 h-10')}<div class="flex-1 min-w-0"><h4 class="text-sm font-semibold">${esc(user.name)}</h4><p class="text-xs text-slate-500">${esc(user.email)}</p></div><div class="flex items-center gap-2"><select class="role-select bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium" data-user-id="${user.id}" ${user.id===cud.id?'disabled':''}>${roles.map(r=>`<option value="${r}" ${user.role===r?'selected':''}>${r.replace('_',' ')}</option>`).join('')}</select>${user.id!==cud.id?`<button class="save-role-btn px-3 py-2 bg-amber-500 text-slate-900 rounded-xl text-xs font-bold hidden" data-user-id="${user.id}">Save</button>`:''}</div></div>`).join(''):'<div class="bg-white p-10 rounded-2xl border text-center"><p class="text-slate-500">No approved users yet.</p></div>'}</div>`;document.querySelectorAll('.role-select').forEach(select=>{const userId=select.dataset.userId;const saveBtn=document.querySelector(`.save-role-btn[data-user-id="${userId}"]`);if(!saveBtn)return;select.addEventListener('change',()=>{saveBtn.classList.remove('hidden')});saveBtn.addEventListener('click',async()=>{const newRole=select.value;const idx=uc.findIndex(u=>u.id===userId);if(idx>=0){uc[idx].role=newRole;await db.collection('users').doc(userId).update({role:newRole});tst(`Role updated to ${newRole.replace('_',' ')}.`,'success');saveBtn.classList.add('hidden')}})})}

  // ---- Profile ----
  function rp(){const u=cud;if(!u)return;document.getElementById('view-profile').innerHTML=`<header class="mb-4 sm:mb-6"><h1 class="text-xl sm:text-2xl md:text-3xl font-bold">Profile</h1></header><div class="bg-white p-4 sm:p-6 md:p-8 rounded-2xl border"><form id="pf" class="space-y-4 sm:space-y-5"><div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-5 mb-4 sm:mb-6"><div id="pav" class="avatar-initials bg-amber-500 w-16 h-16 text-xl flex-shrink-0">${ifn(u.name)}</div><div class="w-full"><label class="text-xs font-bold text-slate-400 uppercase block mb-1">Profile Photo URL</label><input type="text" id="ppu" class="w-full px-4 py-2.5 rounded-xl border text-sm" value="${esc(u.profilePhoto||'')}"></div></div><div><label>Full Name</label><input type="text" id="pnm" required class="w-full px-4 py-3 rounded-xl border text-sm" value="${esc(u.name)}"></div><div><label>Contact Number</label><input type="text" id="pcn" class="w-full px-4 py-3 rounded-xl border text-sm" value="${esc(u.contactNumber||'')}"></div><div><label>Email</label><input type="email" id="pem" required class="w-full px-4 py-3 rounded-xl border text-sm" value="${esc(u.email)}"></div><div><label>Description</label><textarea id="pds" rows="3" class="w-full px-4 py-3 rounded-xl border text-sm">${esc(u.description||'')}</textarea></div><div><label>New Password</label><input type="password" id="ppw" class="w-full px-4 py-3 rounded-xl border text-sm"></div><button type="submit" class="w-full py-3 bg-slate-900 text-white rounded-xl text-sm font-bold">Save Changes</button></form></div>`;document.getElementById('pf').addEventListener('submit',async function(e){e.preventDefault();const upd={name:document.getElementById('pnm').value.trim(),contactNumber:document.getElementById('pcn').value.trim(),email:document.getElementById('pem').value.trim().toLowerCase(),description:document.getElementById('pds').value.trim(),profilePhoto:document.getElementById('ppu').value.trim()};const np=document.getElementById('ppw').value;if(np&&np.length>=6){const user=auth.currentUser;if(user)await user.updatePassword(np)}await db.collection('users').doc(u.id).update(upd);Object.assign(cud,upd);us();tst('Profile updated.','success')});document.getElementById('ppu').addEventListener('input',function(){const pv=document.getElementById('pav');const url=this.value.trim();if(url)pv.innerHTML=`<img src="${esc(url)}" class="w-16 h-16 rounded-full object-cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><span class="avatar-initials bg-amber-500 w-16 h-16 text-xl" style="display:none">${ifn(cud.name)}</span>`;else pv.innerHTML=`<span class="avatar-initials bg-amber-500 w-16 h-16 text-xl">${ifn(cud.name)}</span>`})}

  // ---- Auth listener and forms ----
  let il=true;
  auth.onAuthStateChanged(async user=>{
    if(user){
      if(!il)return;
      il=false;
      try{
        await lad(user.uid);
        sa();
      }catch(e){
        console.error(e);
        il=true;
        await auth.signOut();
        sh();
        tst(e.message||'Error loading data. Please refresh and try again.','error');
      }
    }else{
      sh();
      il=true;
    }
  });

  document.getElementById('login-form').addEventListener('submit',async e=>{e.preventDefault();const em=document.getElementById('login-email').value.trim().toLowerCase();const pw=document.getElementById('login-password').value;try{await auth.signInWithEmailAndPassword(em,pw)}catch(err){tst(err.message,'error')}});
  document.getElementById('register-form').addEventListener('submit',async e=>{e.preventDefault();const nm=document.getElementById('reg-name').value.trim();const em=document.getElementById('reg-email').value.trim().toLowerCase();const pw=document.getElementById('reg-password').value;const rl=document.getElementById('reg-role').value;const fnm=document.getElementById('reg-firm-name').value.trim();const fii=document.getElementById('reg-firm-id').value.trim().toUpperCase();try{const cred=await auth.createUserWithEmailAndPassword(em,pw);const uid=cred.user.uid;let fid=null,isf=false;if(rl==='client'){if(!fii)throw new Error('Enter Firm ID to join as client.');const snap=await db.collection('firms').doc(fii).get();if(!snap.exists)throw new Error('Firm ID not found.');fid=fii}else if(fnm&&!fii){fid=gfi();let ex=await db.collection('firms').doc(fid).get();while(ex.exists){fid=gfi();ex=await db.collection('firms').doc(fid).get()}await db.collection('firms').doc(fid).set({id:fid,name:fnm,taskStatuses:[],caseStatuses:[],createdAt:new Date().toISOString()});isf=true}else if(fii&&!fnm){const snap=await db.collection('firms').doc(fii).get();if(!snap.exists)throw new Error('Firm ID not found.');fid=fii}else throw new Error('Create new firm OR join existing.');const ud={id:uid,name:nm,email:em,firmId:fid,role:isf?'managing_partner':rl,contactNumber:'',description:'',profilePhoto:'',approved:isf,createdAt:new Date().toISOString()};await db.collection('users').doc(uid).set(ud);if(isf){await new Promise(r=>setTimeout(r,2000));il=false;await lad(uid);sa();tst(`Firm "${fnm}" created! ID: ${fid}`,'success')}else{await auth.signOut();swl();tst('Registration submitted. Waiting for approval.','info')}}catch(err){tst(err.message,'error')}});
  document.getElementById('btn-logout').addEventListener('click',()=>auth.signOut());

  function swl(){document.getElementById('login-form').classList.remove('hidden');document.getElementById('register-form').classList.add('hidden')}
  function swr(){document.getElementById('login-form').classList.add('hidden');document.getElementById('register-form').classList.remove('hidden')}
  document.getElementById('tab-login').addEventListener('click',swl);document.getElementById('tab-register').addEventListener('click',swr);

  window.cm=cm;

  // Show login screen initially if no user (session persistence already cleared)
  if(!auth.currentUser) sh();
})();
</script>
</body>
</html>
