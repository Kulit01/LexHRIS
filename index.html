// ========== HELPER FUNCTIONS ==========
function formatDate(d){if(!d)return '';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function formatDateTime(d){if(!d)return '';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
function fmtAssignees(ids,users){if(!ids||!ids.length)return '-';return ids.map(id=>{const u=users.find(x=>x.id===id);return u?`${u.firstName} ${u.lastName}`:'?'}).join(', ');}
function generateICalendarEvent(caseObj,hearing){
  const start=new Date(`${hearing.date}T${hearing.time||'09:00'}:00`);const end=new Date(start.getTime()+60*60*1000);
  const f=d=>d.toISOString().replace(/-|:|\.\d+/g,'');
  return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//PH Law Firm Manager//EN\nBEGIN:VEVENT\nUID:${Date.now()}-${Math.random().toString(36).substr(2,8)}@phlawmanager.com\nDTSTAMP:${f(new Date())}\nDTSTART:${f(start)}\nDTEND:${f(end)}\nSUMMARY:⚖️ Hearing: ${caseObj.caseName}\nDESCRIPTION:Case: ${caseObj.caseName}\\nClient: ${caseObj.clientName||'N/A'}\\nReference: ${caseObj.caseRef||'N/A'}\\nHearing: ${hearing.description||'Court hearing'}\nLOCATION:Court Hearing\nBEGIN:VALARM\nTRIGGER:-PT${hearing.reminderMinutes||30}M\nACTION:DISPLAY\nDESCRIPTION:Reminder: Hearing in ${caseObj.caseName}\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;
}
async function syncToGoogleCalendar(caseObj,hearing){
  const ical=generateICalendarEvent(caseObj,hearing);
  const blob=new Blob([ical],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`hearing_${caseObj.caseName.replace(/\s/g,'_')}_${hearing.date}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  return true;
}

async function render(){

    const app=document.getElementById('app');
    if(!ST.user){
      app.innerHTML=aScr();
      bind();
      return;
    }
    const firm=await DS.findFirm(ST.user.lawFirmId);
    app.innerHTML=mainApp(firm?firm.firmName:'Unknown Firm');
    document.getElementById('main-area').innerHTML=await curView();
    if(window.innerWidth>=769){document.getElementById('sidebar').classList.add('open');}
    if(ST.modal)renderModal();
    if(ST.taskDetailModal && ST.selT) renderTaskDetailModal();
    bind();
  }catch(e){console.error(e);}
}

async function curView(){
  if(ST.user.role==='client'){
    if(ST.view==='cases' && ST.selC) return await caseDetailView();
    return await clientDashboard();
  }
  switch(ST.view){
    case 'dashboard': return await dashboardView();
    case 'cases': return ST.selC?await caseDetailView():await casesListView();
    case 'tasks': return await tasksView();
    case 'teams': return await teamsView();
    case 'members': return await membersView();
    case 'approvals': return await approvalsView();
    case 'timesheets': return await timesheetsView();
    case 'reports': return await reportsView();
    case 'profile': return await profileView();
    default: return await dashboardView();
  }
}
// ========== DASHBOARD ==========
async function dashboardView(){
  const cases=await DS.cases(ST.user.lawFirmId);
  const tasks=await DS.tasks(ST.user.lawFirmId);
  const users=await DS.allU();
  const pendingTasks=tasks.filter(t=>t.status!=='completed').length;
  const logs=await DS.getTimeLogsByUser(ST.user.id,ST.user.lawFirmId);
  const totalHours=logs.reduce((s,l)=>s+l.durationMinutes/60,0);
  const now=new Date(), threeDays=now.getTime()+3*24*60*60*1000;
  const upcomingTasks=tasks.filter(t=>t.dueDate&&t.status!=='completed'&&new Date(t.dueDate)<=threeDays);
  const recentTasks=tasks.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  const recentCases=cases.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  let reminderHtml='';
  if(upcomingTasks.length) reminderHtml=`<div class="reminder-banner"><i class="fas fa-bell"></i> <span><strong>${upcomingTasks.length}</strong> task(s) due within 3 days</span><button class="btn btn-o btn-sm" onclick="ST.view='tasks';render();" style="margin-left:auto;">View Tasks →</button></div>`;
  return `<div class="dashboard-cards"><div class="dashboard-card" onclick="ST.view='cases';ST.selC=null;render();"><div class="card-value">${cases.length}</div><div class="card-label">Active Cases</div><div class="card-desc">Total open legal matters</div></div><div class="dashboard-card" onclick="ST.view='tasks';render();"><div class="card-value">${pendingTasks}</div><div class="card-label">Pending Tasks</div><div class="card-desc">Awaiting completion</div></div><div class="dashboard-card" onclick="ST.view='timesheets';render();"><div class="card-value">${totalHours.toFixed(1)}h</div><div class="card-label">Billable Hours</div><div class="card-desc">Logged this month</div></div><div class="dashboard-card" onclick="ST.view='tasks';render();"><div class="card-value">${upcomingTasks.length}</div><div class="card-label">Upcoming Deadlines</div><div class="card-desc">Due in next 3 days</div></div></div>${reminderHtml}<div class="grid-2cols"><div class="dashboard-section"><h3><i class="fas fa-tasks"></i> Recent Tasks</h3><div class="recent-list">${recentTasks.map(t=>{const assigneeNames=(t.assigneeIds||[]).map(id=>{const u=users.find(x=>x.id===id);return u?`${u.firstName} ${u.lastName}`:'';}).filter(Boolean).join(', ');return `<div class="recent-item" onclick="openTaskDetail('${t.id}')"><div class="recent-info"><div class="recent-title">${escapeHtml(t.title)}</div><div class="recent-meta">${assigneeNames||'Unassigned'} • Due ${t.dueDate?formatDate(t.dueDate):'No date'}</div></div><span class="recent-badge ${t.status==='completed'?'completed':(t.status==='in_progress'?'in_progress':'pending')}">${(t.status||'pending').replace('_',' ')}</span></div>`}).join('')||'<div class="empty">No tasks yet.</div>'}</div></div><div class="dashboard-section"><h3><i class="fas fa-folder-open"></i> Recent Cases</h3><div class="recent-list">${recentCases.map(c=>`<div class="recent-item" onclick="selectCase('${c.id}')"><div class="recent-info"><div class="recent-title">${escapeHtml(c.caseName)}</div><div class="recent-meta">${c.clientName||'No client'} • Opened ${formatDate(c.createdAt)}</div></div><span class="recent-badge ${c.status==='active'?'active':(c.status==='pending'?'pending':'')}">${(c.status||'active').toUpperCase()}</span></div>`).join('')||'<div class="empty">No cases yet.</div>'}</div></div></div>`;
}

pdates.length?updates.map(u=>`<div class="update-item"><div class="update-time">${formatDateTime(u.date)}</div><div class="update-message">${u.message}</div></div>`).join(''):'<div class="empty">No updates yet.</div>'}</div><div class="update-input-group"><input type="text" id="newUpdateInput" placeholder="Add a case update..."><button class="btn btn-p btn-sm" id="addUpdateBtn">Post Update</button></div></div></div><div class="right-column"><div class="info-card"><h3><i class="fas fa-user"></i> CLIENT DETAILS</h3><p><strong>${c.clientName||'No client assigned'}</strong></p>${c.clientId?`<p style="font-size:12px;margin-top:4px;">UID: ${c.clientId}</p>`:''}</div><div class="info-card"><h3><i class="fas fa-timeline"></i> CASE TIMELINE</h3><p>Opened On<br><strong>${formatDate(c.createdAt)||'N/A'}</strong></p></div><div class="info-card"><h3><i class="fas fa-chart-simple"></i> QUICK STATS</h3><p>Total Tasks: <strong>${caseTasks.length}</strong></p><p>Completed: <strong>${completedTasks}</strong></p></div><div class="info-card"><h3><i class="fas fa-percent"></i> COMPLETION RATE</h3><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;"><div class="stat-circle">${completionRate}%</div><div class="progress-bar"><div class="progress-fill" style="width:${completionRate}%;"></div></div></div></div><div class="info-card"><h3><i class="fas fa-users"></i> ASSIGNED TEAM</h3>${teamMembers.length?teamMembers.map(m=>`<div class="team-member"><div class="member-avatar">${m.firstName?.charAt(0)||'?'}${m.lastName?.charAt(0)||''}</div><div><div class="member-name">${m.firstName} ${m.lastName}</div><div class="member-role">${m.role||'Team Member'}</div></div></div>`).join(''):'<div class="empty">No team assigned</div>'}</div></div></div>`:ST.activeTab==='tasks'?`<div><button class="btn btn-p btn-sm" id="newTaskForCaseBtn" style="margin-bottom:16px;"><i class="fas fa-plus"></i> Add Task</button><div class="task-list">${caseTasks.length?caseTasks.map(t=>`<div class="task-item async function tasksView(){
  let tasks=await DS.tasks(ST.user.lawFirmId);
  const users=await DS.allU();
  const allCases=await DS.cases(ST.user.lawFirmId);
  const caseMap=Object.fromEntries(allCases.map(c=>[c.id,c]));
  let filtered=tasks;
  if(ST.filt.status&&ST.filt.status!=='') filtered=filtered.filter(t=>t.status===ST.filt.status);
  if(ST.filt.priority&&ST.filt.priority!=='') filtered=filtered.filter(t=>t.priority===ST.filt.priority);
  if(ST.filt.search&&ST.filt.search.trim()!==''){const s=ST.filt.search.toLowerCase();filtered=filtered.filter(t=>t.title.toLowerCase().includes(s)||(caseMap[t.caseId]?.caseName||'').toLowerCase().includes(s)||(t.assigneeIds||[]).some(id=>{const u=users.find(u=>u.id===id);return u&&(u.firstName+' '+u.lastName).toLowerCase().includes(s);}));}
  if(ST.filt.sortBy==='createdAt') filtered.sort((a,b)=>ST.filt.sortDir==='asc'?new Date(a.createdAt)-new Date(b.createdAt):new Date(b.createdAt)-new Date(a.createdAt));
  else if(ST.filt.sortBy==='dueDate') filtered.sort((a,b)=>ST.filt.sortDir==='asc'?(a.dueDate||'9999')-(b.dueDate||'9999'):(b.dueDate||'9999')-(a.dueDate||'9999'));
  else if(ST.filt.sortBy==='priority'){const order={urgent:0,high:1,medium:2,low:3};filtered.sort((a,b)=>ST.filt.sortDir==='asc'?(order[a.priority]||99)-(order[b.priority]||99):(order[b.priority]||99)-(order[a.priority]||99));}
  let html='';
  for(const t of filtered){
    const assigneeNames=(t.assigneeIds||[]).map(id=>{const u=users.find(x=>x.id===id);return u?`${u.firstName} ${u.lastName}`:'';}).filter(Boolean).join(', ');
    const caseName=caseMap[t.caseId]?.caseName||'';
    const logs=await DS.getTimeLogsByTask(t.id);
    const totalMins=logs.reduce((s,l)=>s+l.durationMinutes,0);
    const timeStr=`${Math.floor(totalMins/60).toString().padStart(2,'0')}:${(totalMins%60).toString().padStart(2,'0')}`;
    const subtasks=tasks.filter(st=>st.parentTaskId===t.id);
    html+=`<div class="task-card" data-task-id="${t.id}"><div class="task-card-header"><div class="task-title">${escapeHtml(t.title)}</div><div class="task-priority ${t.priority||'medium'}">${(t.priority||'MEDIUM').toUpperCase()}</div></div><div class="task-details"><div class="task-detail-item"><i class="far fa-calendar-alt"></i> Due ${t.dueDate?formatDate(t.dueDate):'No due date'}</div><div class="task-detail-item"><i class="fas fa-user"></i> ${assigneeNames||'Unassigned'}</div><div class="task-detail-item"><i class="fas fa-folder"></i> ${caseName||'No case'}</div><div class="task-detail-item"><i class="fas fa-clock"></i> ${timeStr}</div>${subtasks.length?`<div class="task-detail-item"><i class="fas fa-code-branch"></i> ${subtasks.length} Dependencies</div>`:''}</div><div class="task-footer"><button class="task-status-btn ${t.status||'pending'}" data-status="${t.status||'pending'}" data-task-id="${t.id}">${(t.status||'pending').replace('_',' ').toUpperCase()}</button><div class="task-time-log">⏱️ ${timeStr} logged</div></div></div>`;
  }
  if(filtered.length===0) html='<div class="empty">No tasks found. Create a new task to get started.</div>';
  return `<div class="task-controls"><div class="search-bar"><input type="text" id="taskSearchInput" placeholder="Search tasks, cases, or team members..." value="${escapeHtml(ST.filt.search||'')}"></div><div class="filter-row"><div class="filter-group"><select id="filterStatus"><option value="">All Status</option><option value="pending" ${ST.filt.status==='pending'?'selected':''}>Pending</option><option value="in_progress" ${ST.filt.status==='in_progress'?'selected':''}>In Progress</option><option value="completed" ${ST.filt.status==='completed'?'selected':''}>Completed</option></select><select id="filterPriority"><option value="">All Priority</option><option value="low" ${ST.filt.priority==='low'?'selected':''}>Low</option><option value="medium" ${ST.filt.priority==='medium'?'selected':''}>Medium</option><option value="high" ${ST.filt.priority==='high'?'selected':''}>High</option><option value="urgent" ${ST.filt.priority==='urgent'?'selected':''}>Urgent</option></select></div><div class="sort-group"><span>SORT:</span><select id="sortBy"><option value="createdAt" ${ST.filt.sortBy==='createdAt'?'selected':''}>Created Date</option><option value="dueDate" ${ST.filt.sortBy==='dueDate'?'selected':''}>Due Date</option><option value="priority" ${ST.filt.sortBy==='priority'?'selected':''}>Priority</option></select><select id="sortDir"><option value="desc" ${ST.filt.sortDir==='desc'?'selected':''}>Descending</option><option value="asc" ${ST.filt.sortDir==='asc'?'selected':''}>Ascending</option></select></div><button class="btn btn-p btn-sm" id="newTaskBtnHeader"><i class="fas fa-plus"></i> New Task</button></div></div><div class="tasks-grid" id="tasksGrid">${html}</div>`;
}

    body.innerHTML=`<div class="fgrid"><div class="inp ffull"><label>Title *</label><input type="text" id="editTaskTitle" value="${task.title.replace(/"/g,'&quot;')}" required></div><div class="inp ffull"><label>Description</label><textarea id="editTaskDesc" rows="2">${task.description||''}</textarea></div><div class="inp"><label>Due Date</label><input type="date" id="editTaskDue" value="${task.dueDate||''}"></div><div class="inp"><label>Priority</label><select id="editTaskPriority"><option value="low" ${task.priority==='low'?'selected':''}>Low</option><option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option><option value="high" ${task.priority==='high'?'selected':''}>High</option><option value="urgent" ${task.priority==='urgent'?'selected':''}>Urgent</option></select></div><div class="inp"><label>Status</label><select id="editTaskStatus"><option value="pending" ${task.status==='pending'?'selected':''}>Pending</option><option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option><option value="completed" ${task.status==='completed'?'selected':''}>Completed</option></select></div><div class="inp"><label>Case</label><select id="editTaskCase"><option value="">None</option>${cases.map(c=>`<option value="${c.id}" ${task.caseId===c.id?'selected':''}>${c.caseName}</option>`).join('')}</select></div><div class="inp ffull"><label>Assignees</label><select id="editTaskAssignees" multiple style="min-height:100px;">${users.map(u=>`<option value="${u.id}" ${(task.assigneeIds||[]).includes(u.id)?'selected':''}>${u.firstName} ${u.lastName}</option>`).join('')}</select></div><div class="inp ffull"><label>Tags (comma separated)</label><input type="text" id="editTaskTags" value="${(task.tags||[]).join(', ')}"></div><div class="inp ffull"><label>Notes</label><textarea id="editTaskNotes" rows="2">${task.notes||''}</textarea></div></div>`;
  }
}
function taskDetailModalHtml(){return `<div class="modal-overlay" id="taskModalOverlay"><div class="modal task-detail-modal"><div class="modal-head"><h2><i class="fas fa-tasks"></i> Task Details</h2><button class="modal-close" id="closeTaskModalBtn">✕</button></div><div class="modal-body" id="taskModalBody"></div><div class="modal-foot"><button class="btn btn-o" id="editTaskFromDetailBtn"><i class="fas fa-edit"></i> Edit</button><button class="btn btn-d" id="deleteTaskBtn"><i class="fas fa-trash"></i> Delete</button><button class="btn btn-p" id="closeTaskModalFootBtn">Close</button></div></div></div>`;}
async function renderTaskDetailModal(){
  const body=document.getElementById('taskModalBody'); if(!body||!ST.selT) return;
  const task=ST.selT, users=await DS.allU(), assignees=(task.assigneeIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
  const timeLogs=await DS.getTimeLogsByTask(task.id), totalMinutes=timeLogs.reduce((s,l)=>s+l.durationMinutes,0);
  const allTasks=await DS.tasks(ST.user.lawFirmId), subtasks=allTasks.filter(st=>st.parentTaskId===task.id);
  const caseInfo=task.caseId?(await DS.cases(ST.user.lawFirmId)).find(c=>c.id===task.caseId):null;
  body.innerHTML=`<div class="task-detail-section"><h4>Basic Information</h4><div class="info-row"><span class="info-label">Title:</span><span class="info-value">${task.title}</span></div><div class="info-row"><span class="info-label">Status:</span><span class="info-value"><span class="badge-s ${task.status}">${task.status||'pending'}</span></span></div><div class="info-row"><span class="info-label">Priority:</span><span class="info-value"><span class="badge-s">${task.priority||'medium'}</span></span></div><div class="info-row"><span class="info-label">Due Date:</span><span class="info-value">${task.dueDate?formatDate(task.dueDate):'Not set'}</span></div><div class="info-row"><span class="info-label">Created:</span><span class="info-value">${formatDate(task.createdAt)}</span></div><div class="info-row"><span class="info-label">Last Updated:</span><span class="info-value">${formatDate(task.updatedAt)}</span></div></div><div class="task-detail-section"><h4>Description</h4><div class="info-value">${task.description||'No description provided.'}</div></div><div class="task-detail-section"><h4>Assignees</h4><div class="info-value">${assignees.length?assignees.map(a=>`${a.firstName} ${a.lastName}`).join(', '):'None'}</div></div>${caseInfo?`<div class="task-detail-section"><h4>Related Case</h4><div class="info-value"><a href="#" onclick="selectCase('${caseInfo.id}'); return false;">${caseInfo.caseName}</a></div></div>`:''}<div class="task-detail-section"><h4>Tags</h4><div class="info-value">${(task.tags||[]).join(', ')||'None'}</div></div><div class="task-detail-section"><h4>Notes</h4><div class="info-value">${task.notes||'None'}</div></div><div class="task-detail-section"><h4>Time Logged <button class="btn btn-o btn-sm" id="addTimeToTaskBtn" style="margin-left:8px;"><i class="fas fa-clock"></i> Log Time</button></h4><div class="info-row"><span class="info-label">Total:</span><span class="info-value">${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m</span></div>${timeLogs.length?`<div style="margin-top:12px;">${timeLogs.map(l=>`<div class="time-entry-item"><div><strong>${l.date}</strong> - ${l.durationMinutes} min ${l.billable?'(Billable)':''}</div><button class="btn btn-d btn-sm delete-time-log-task" data-id="${l.id}">✕</button></div>`).join('')}</div>`:'<div>No time entries yet.</div>'}</div><div class="task-detail-section"><h4>Subtasks <button class="btn btn-o btn-sm" id="addSubtaskBtn"><i class="fas fa-plus"></i> Add Subtask</button></h4>${subtasks.length?subtasks.map(st=>`<div class="subtask-item"><div><span class="subtask-status" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${st.status==='completed'?'#10b981':'#f59e0b'};margin-right:8px;"></span> ${st.title} <span class="badge-s">${st.status||'pending'}</span></div><button class="btn btn-o btn-sm view-subtask" data-id="${st.id}">View</button></div>`).join(''):'<div>No subtasks.</div>'}</div>`;
  document.getElementById('addTimeToTaskBtn')?.addEventListener('click',async()=>{const mins=prompt('Minutes worked:');if(mins&&!isNaN(parseInt(mins))){await DS.addTimeLog({taskId:task.id,userId:ST.user.id,lawFirmId:ST.user.lawFirmId,date:new Date().toISOString().slice(0,10),durationMinutes:parseInt(mins),billable:true});ST.taskDetailModal=false;render();setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100);}});
  document.querySelectorAll('.delete-time-log-task').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation();if(confirm('Delete this time entry?')){await DS.deleteTimeLog(btn.dataset.id);ST.taskDetailModal=false;render();setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100);}}));
  document.getElementById('addSubtaskBtn')?.addEventListener('click',async()=>{const title=prompt('Subtask title:');if(title){await DS.addTask({title,parentTaskId:task.id,isSubTask:true,lawFirmId:ST.user.lawFirmId,status:'pending',priority:task.priority||'medium',createdById:ST.user.id});ST.taskDetailModal=false;render();setTimeout(()=>{ST.taskDetailModal=true;ST.selT=task;render();},100);}});
  document.querySelectorAll('.view-subtask').forEach(btn=>btn.addEventListener('click',async()=>{const id=btn.dataset.id;const subtask=allTasks.find(t=>t.id===id);if(subtask){ST.selT=subtask;ST.taskDetailModal=true;render();}}));
  document.getElementById('editTaskFromDetailBtn')?.addEventListener('click',()=>{ST.taskDetailModal=false;ST.editTaskData=task;ST.modalMode='editTask';ST.modal=true;render();});
  document.getElementById('deleteTaskBtn')?.addEventListener('click',async()=>{if(confirm(`Delete task "${task.title}"?`)){await DS.delTask(task.id);ST.taskDetailModal=false;ST.selT=null;render();}});
}
window.selectCase=async function(id){const cases=await DS.cases(ST.user.lawFirmId);ST.selC=cases.find(c=>c.id===id);ST.activeTab='overview';ST.view='cases';render();};

// ========== AUTHENTICATION ==========
async function handleEmailLogin(){
  const em=document.getElementById('le')?.value;
  const pw=document.getElementById('lp')?.value;
  if(!em||!pw){ST.err='Fill all fields';render();return;}
  if(useFB){
    try{
      const cred=await auth.signInWithEmailAndPassword(em,pw);
      const p=await DS.uprofile(cred.user.uid);
      if(p){
        ST.user=p;
        ST.view='dashboard';
        render();
      } else {
        const pending=await DS.getPendingStatus(cred.user.uid);
        if(pending){
          ST.err='Your account is pending approval.';
          await auth.signOut();
          render();
        } else {
          ST.err='Account not found. Register first.';
          await auth.signOut();
          render();
        }
      }
    }catch(err){ST.err=err.message;render();}
  } else {
    const u=g(LS.U).find(x=>x.email===em&&x.password===pw);
    if(u){ST.user=u;ST.view='dashboard';render();}
    else{ST.err='Invalid credentials';render();}
  }
}
async function handleGoogleLogin(){
  if(!useFB)return;
  const prov=new firebase.auth.GoogleAuthProvider();
  try{
    const res=await auth.signInWithPopup(prov);
    const p=await DS.uprofile(res.user.uid);
    if(p){
      ST.user=p;
      ST.view='dashboard';
      render();
    } else {
      const pending=await DS.getPendingStatus(res.user.uid);
      if(pending){
        ST.err='Your account is pending approval.';
        await auth.signOut();
        render();
      } else {
        ST.err='No account linked. Register first.';
        await auth.signOut();
        render();
      }
    }
  }catch(err){if(err.code!=='auth/popup-closed-by-user'){ST.err=err.message;render();}}
}
async function handleRegister(){
  const fn=document.getElementById('rfn')?.value;
  const fi=document.getElementById('rfi')?.value;
  const la=document.getElementById('rla')?.value;
  const em=document.getElementById('re')?.value;
  const pw=document.getElementById('rp')?.value;
  const hr=parseFloat(document.getElementById('rhr')?.value||0);
  if(!fn||!fi||!la||!em||pw.length<6){ST.err='All fields required, password min 6';render();return;}
  if(useFB){
    try{
      const cr=await auth.createUserWithEmailAndPassword(em,pw);
      const fid=DS.genId();
      const profile={email:em,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr};
      await DS.sprofile(cr.user.uid,profile);
      await DS.addFirm({firmId:fid,firmName:fn,createdBy:cr.user.uid});
      ST.user=profile;
      ST.suc='Firm created! Your Firm ID: '+fid;
      render();
    }catch(err){ST.err=err.message;render();}
  } else {
    const fid=DS.genId();
    const u={id:'U'+Date.now(),email:em,password:pw,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr};
    const users=g(LS.U);
    users.push(u);
    s(LS.U,users);
    await DS.addFirm({firmId:fid,firmName:fn,createdBy:u.id});
    ST.user=u;
    s(LS.CUR,u);
    ST.view='dashboard';
    render();
  }
}
async function handleJoin(){
  const fid=document.getElementById('jfi')?.value;
  const fi=document.getElementById('jfn')?.value;
  const la=document.getElementById('jln')?.value;
  const em=document.getElementById('je')?.value;
  const pw=document.getElementById('jp')?.value;
  const role=document.getElementById('jr')?.value;
  const hr=parseFloat(document.getElementById('jhr')?.value||0);
  if(!fid||!fi||!la||!em||pw.length<6){ST.err='All fields required';render();return;}
  const firm=await DS.findFirm(fid);
  if(!firm){ST.err='Firm not found';render();return;}
  if(useFB){
    try{
      const cr=await auth.createUserWithEmailAndPassword(em,pw);
      await DS.createJoinRequest(cr.user.uid,fid,{email:em,firstName:fi,lastName:la,role,hourlyRate:hr});
      ST.suc='Join request sent! Wait for approval.';
      await auth.signOut();
      render();
    }catch(err){ST.err=err.message;render();}
  } else {
    const uid='U'+Date.now();
    await DS.createJoinRequest(uid,fid,{email:em,firstName:fi,lastName:la,role,password:pw,hourlyRate:hr});
    ST.suc='Join request sent! Wait for approval.';
    ST.user=null;
    s(LS.CUR,null);
    render();
  }
}
render();
})();
