<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>PH Law Firm Manager – Responsive Case Management</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #0d47a1;
      --primary-light: #e8f0fe;
      --navy: #0a2540;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #5f6368;
      --border: #e0e0e0;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
      --sidebar-w: 260px;
      --sidebar-w-mobile: 260px;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #dc2626;
      --info: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Auth Styles */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f0f4ff, #e8edf5);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: clamp(24px, 5vw, 40px) clamp(20px, 4vw, 32px);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .auth-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
    .inp { margin-bottom: 14px; text-align: left; }
    .inp label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .inp input, .inp select, .inp textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
      font-family: inherit;
      transition: all 0.2s;
    }
    .inp input:focus, .inp select:focus, .inp textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,71,161,0.1); }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .btn-p { background: var(--primary); color: #fff; }
    .btn-p:hover { background: #0a3a7e; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(13,71,161,0.3); }
    .btn-o { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-o:hover { background: #f8f9fa; border-color: var(--primary); }
    .btn-d { background: var(--danger); color: #fff; }
    .btn-d:hover { background: #b91c1c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; gap: 4px; }
    .btn-google { background: #fff; border: 1px solid var(--border); color: var(--text); width: 100%; }
    .tabs { display: flex; gap: 15px; margin-bottom: 22px; justify-content: center; flex-wrap: wrap; }
    .tab { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; transition: 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .err { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; }
    .suc { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--text-secondary); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100%;
      background: var(--navy);
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 20px rgba(0,0,0,0.15);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 150; backdrop-filter: blur(2px); }
    .sidebar-backdrop.show { display: block; }
    .sidebar-head { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-head .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .sidebar-close { background: none; border: none; font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7); padding: 8px; border-radius: 8px; }
    .sidebar-close:hover { background: rgba(255,255,255,0.1); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      margin: 4px 12px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: 0.2s;
      border-radius: 10px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }
    .nav-item i { width: 24px; text-align: center; font-size: 18px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.6); }

    /* Main Content - Responsive */
    .main-content { 
      flex: 1; 
      padding: clamp(16px, 3vw, 32px); 
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
    }
    .topbar {
      background: #fff;
      padding: clamp(12px, 2vw, 20px) clamp(16px, 3vw, 24px);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hamburger { 
      display: none; 
      background: none; 
      border: none; 
      font-size: 24px; 
      cursor: pointer; 
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .hamburger:hover { background: #f0f0f0; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .sync-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 6px; background: #e8f0fe; color: var(--primary); }
    .sync-badge.online { background: #d1fae5; color: #065f46; }
    .sync-badge.offline { background: #fee2e2; color: #b91c1c; }
    .firm-id { background: #f0f4ff; padding: 4px 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
    .logout-btn { padding: 6px 14px; background: none; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { background: #fee2e2; border-color: var(--danger); color: var(--danger); }

    /* Cards - Responsive Grid */
    .cards { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr)); 
      gap: 16px; 
      margin-bottom: 24px; 
    }
    .card {
      background: #fff;
      padding: clamp(16px, 3vw, 24px);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .card.green { border-left-color: var(--success); }
    .card.orange { border-left-color: var(--warning); }
    .card.purple { border-left-color: #8b5cf6; }
    .card-val { font-size: clamp(28px, 5vw, 36px); font-weight: 700; line-height: 1.2; }
    .card-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Tables - Responsive */
    .table-wrap { 
      background: #fff; 
      border-radius: 16px; 
      box-shadow: var(--shadow); 
      overflow-x: auto; 
      margin-bottom: 24px; 
    }
    .task-table { 
      width: 100%; 
      min-width: 500px; 
      border-collapse: collapse; 
    }
    .task-table th { 
      text-align: left; 
      padding: 14px 16px; 
      background: #f8fafd; 
      color: var(--text-secondary); 
      font-weight: 600; 
      font-size: 12px; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .task-table td { 
      padding: 12px 16px; 
      border-bottom: 1px solid var(--border); 
      font-size: 14px; 
    }
    .task-table tr:hover { background: #f0f7ff; cursor: pointer; }
    .badge-s { 
      display: inline-block; 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-size: 11px; 
      font-weight: 600; 
      background: #e5e7eb; 
      color: #374151; 
    }
    .badge-s.completed { background: #d1fae5; color: #065f46; }
    .badge-s.in_progress { background: #dbeafe; color: #1e40af; }
    .badge-s.pending { background: #fed7aa; color: #9a3412; }
    .badge-s.active { background: #d1fae5; color: #065f46; }

    /* Case Page - FULLY RESPONSIVE */
    .case-header {
      background: #fff;
      border-radius: 20px;
      padding: clamp(20px, 4vw, 32px);
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .case-title-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .case-title { 
      font-size: clamp(22px, 5vw, 32px); 
      font-weight: 700; 
      color: var(--primary); 
      word-break: break-word;
    }
    .case-badge { 
      display: inline-block; 
      padding: 4px 14px; 
      border-radius: 30px; 
      font-size: 12px; 
      font-weight: 600; 
      background: #d1fae5; 
      color: #065f46; 
    }
    .case-id { 
      color: var(--text-secondary); 
      font-size: 12px; 
      margin-bottom: 20px; 
      font-family: monospace;
      word-break: break-all;
    }
    .case-tabs {
      display: flex;
      gap: clamp(16px, 4vw, 32px);
      border-bottom: 1px solid var(--border);
      margin-top: 20px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .case-tab {
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
      white-space: nowrap;
    }
    .case-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .case-content {
      background: #fff;
      border-radius: 20px;
      padding: clamp(20px, 4vw, 32px);
      box-shadow: var(--shadow);
    }
    
    /* Responsive Two-Column Layout */
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
    }
    
    /* Left Column - Responsive */
    .left-column {
      min-width: 0;
      overflow-x: hidden;
    }
    
    /* Right Column - Responsive */
    .right-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    /* Responsive Cards in Right Column */
    .info-card {
      background: #f8fafd;
      border-radius: 16px;
      padding: clamp(16px, 3vw, 20px);
      transition: all 0.2s;
    }
    .info-card h3 {
      font-size: clamp(14px, 3vw, 16px);
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-card p {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    
    /* Hearing Items - Responsive */
    .hearing-item {
      background: #f8fafd;
      border-radius: 14px;
      padding: clamp(12px, 3vw, 16px);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      transition: all 0.2s;
    }
    .hearing-item:hover {
      background: #f0f4ff;
    }
    .hearing-info {
      flex: 1;
      min-width: 180px;
    }
    .hearing-date {
      font-weight: 700;
      color: var(--primary);
      font-size: clamp(14px, 3vw, 16px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .hearing-description {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .hearing-reminder {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    /* Update Items */
    .update-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .update-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .update-message {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    
    /* Stats */
    .stat-circle {
      width: clamp(60px, 12vw, 80px);
      height: clamp(60px, 12vw, 80px);
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 4vw, 24px);
      font-weight: 700;
      color: var(--primary);
    }
    .progress-bar {
      flex: 1;
      background: #e5e7eb;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--success);
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    
    /* Team Member Items */
    .team-member {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .team-member:hover {
      background: #f0f4ff;
    }
    .member-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }
    .member-info {
      flex: 1;
      min-width: 0;
    }
    .member-name {
      font-weight: 600;
      font-size: 14px;
      word-break: break-word;
    }
    .member-role {
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    /* Task Items */
    .task-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .task-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 150px;
    }
    .task-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .task-status-dot.completed { background: var(--success); }
    .task-status-dot.pending { background: var(--warning); }
    .task-status-dot.in_progress { background: var(--info); }
    .task-details {
      flex: 1;
    }
    .task-title {
      font-weight: 500;
      font-size: 14px;
      word-break: break-word;
    }
    .task-due {
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    /* Action Buttons Group */
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    /* Update Input Group */
    .update-input-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .update-input-group input {
      flex: 1;
      min-width: 150px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
    }
    
    /* Modal - Responsive */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      border-radius: 20px;
      overflow-y: auto;
      animation: modalSlideIn 0.2s ease;
    }
    @keyframes modalSlideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
    }
    .modal-head h2 { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; border-radius: 8px; }
    .modal-close:hover { background: #f0f0f0; }
    .modal-body { padding: 24px; }
    .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; }
    
    /* Form Grid Responsive */
    .fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .ffull { grid-column: 1 / -1; }
    .empty { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
    
    /* Button Styles */
    .btn-sync-calendar {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-sync-calendar:hover {
      background: #0a3a7e;
      transform: translateY(-1px);
    }
    .reminder-banner {
      background: #ffedd5;
      border-left: 4px solid var(--warning);
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    /* Responsive Breakpoints */
    @media (max-width: 900px) {
      .two-columns {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .right-column {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }
    }
    
    @media (max-width: 768px) {
      .sidebar { 
        left: -260px; 
        width: 260px; 
      }
      .sidebar.open { 
        left: 0; 
        transform: translateX(0);
      }
      .sidebar-backdrop.show { 
        display: block; 
      }
      .hamburger { 
        display: block; 
      }
      .main-content { 
        padding: 16px; 
        width: 100%;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .user-info {
        width: 100%;
        justify-content: flex-start;
      }
      .cards {
        grid-template-columns: 1fr;
      }
      .case-header {
        padding: 20px;
      }
      .case-tabs {
        gap: 16px;
      }
      .case-tab {
        font-size: 13px;
      }
      .action-buttons {
        flex-direction: column;
      }
      .btn-sync-calendar, .action-buttons .btn {
        width: 100%;
        justify-content: center;
      }
      .hearing-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .hearing-item .btn {
        align-self: stretch;
        justify-content: center;
      }
      .update-input-group {
        flex-direction: column;
      }
      .update-input-group button {
        width: 100%;
      }
      .task-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .task-info {
        width: 100%;
      }
      .modal {
        max-width: calc(100% - 32px);
        margin: 0 16px;
      }
    }
    
    @media (max-width: 480px) {
      .case-title-section {
        flex-direction: column;
        align-items: flex-start;
      }
      .case-badge {
        align-self: flex-start;
      }
      .info-card {
        padding: 16px;
      }
      .stat-circle {
        width: 60px;
        height: 60px;
        font-size: 20px;
      }
      .team-member {
        padding: 10px;
      }

}
function formatDateTime(dateString) {

// Generate iCalendar file
function generateICalendarEvent(caseObj, hearing) {
  const startDateTime = new Date(`${hearing.date}T${hearing.time || '09:00'}:00`);
  const endDateTime = new Date(startDateTime.getTime() + 60*60*1000);
  const formatICSDate = (date) => date.toISOString().replace(/-|:|\.\d+/g, '');
  return `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//PH Law Firm Manager//EN
BEGIN:VEVENT
UID:${Date.now()}-${Math.random().toString(36).substr(2,8)}@phlawmanager.com
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(startDateTime)}
DTEND:${formatICSDate(endDateTime)}
SUMMARY:⚖️ Hearing: ${caseObj.caseName}
DESCRIPTION:Case: ${caseObj.caseName}\\nClient: ${caseObj.clientName || 'N/A'}\\nReference: ${caseObj.caseRef || 'N/A'}\\nHearing: ${hearing.description || 'Court hearing'}
LOCATION:Court Hearing
BEGIN:VALARM
TRIGGER:-PT${hearing.reminderMinutes || 30}M
ACTION:DISPLAY
DESCRIPTION:Reminder: Hearing in ${caseObj.caseName}
END:VALARM
END:VEVENT
END:VCALENDAR`;
}

async function syncToGoogleCalendar(caseObj, hearing) {
  const icalData = generateICalendarEvent(caseObj, hearing);
  const blob = new Blob([icalData], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hearing_${caseObj.caseName.replace(/\s/g,'_')}_${hearing.date}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  return true;
}

async function timesheetsView(){
  const logs = await DS.getTimeLogsByUser(ST.user.id, ST.user.lawFirmId);
  const tasks = await DS.tasks(ST.user.lawFirmId);
  const taskMap = Object.fromEntries(tasks.map(t=>[t.id,t]));
  let totalHours = 0, totalBillable = 0;
  logs.forEach(l=>{ totalHours += l.durationMinutes/60; if(l.billable) totalBillable += l.durationMinutes/60 * (ST.user.hourlyRate||0); });
  return `<div style="background:#fff;border-radius:16px;padding:24px;"><h2>My Timesheet</h2><div class="cards"><div class="card"><div class="card-val">${totalHours.toFixed(1)}h</div><div class="card-label">Total Logged</div></div><div class="card green"><div class="card-val">₱${totalBillable.toFixed(0)}</div><div class="card-label">Billable Amount</div></div></div><button class="btn btn-p btn-sm" id="addTimeBtn">+ Log Time</button><div class="table-wrap" style="margin-top:20px;"><table class="task-table"><thead><tr><th>Task</th><th>Date</th><th>Duration</th><th>Billable</th><th>Notes</th><th></th></tr></thead><tbody>${logs.map(l=>`<tr><td>${taskMap[l.taskId]?.title||'?'}</td><td>${l.date}</td><td>${l.durationMinutes}min</td><td>${l.billable?'✅':'❌'}</td><td>${l.notes||''}</td><td><button class="btn btn-d btn-sm delete-time-log" data-id="${l.id}">Del</button></td></tr>`).join('')||'<tr><td colspan="6">No time entries</td></tr>'}</tbody></table></div></div>`;
}

async function reportsView(){

window.selectTask = async function(taskId){
  const tasks = await DS.tasks(ST.user.lawFirmId);
  ST.selT = tasks.find(t => t.id === taskId);
  const mins = prompt('Log time (minutes worked) for this task:');
  if(mins && !isNaN(parseInt(mins))){
    await DS.addTimeLog({ taskId, userId:ST.user.id, lawFirmId:ST.user.lawFirmId, date:new Date().toISOString().slice(0,10), durationMinutes:parseInt(mins), billable:true, notes:'' });

  }
};

// Event Binding
function bind(){
  // Sidebar
  document.getElementById('menu-btn')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('bd').classList.add('show');});
  document.getElementById('sb-close')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('bd').classList.remove('show');});
  document.getElementById('bd')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('bd').classList.remove('show');});
  
  // Auth tabs
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');const f=document.getElementById('auth-form');if(this.dataset.tab==='login')f.innerHTML=lForm();else if(this.dataset.tab==='register')f.innerHTML=rForm();else f.innerHTML=jForm();bind();}));
  
  // Auth buttons
  document.getElementById('login-btn')?.addEventListener('click',handleEmailLogin);
  document.getElementById('google-btn')?.addEventListener('click',handleGoogleLogin);
  document.getElementById('reg-btn')?.addEventListener('click',handleRegister);
  document.getElementById('join-btn')?.addEventListener('click',handleJoin);
  document.getElementById('lo-btn')?.addEventListener('click',async()=>{if(useFB)await auth.signOut();ST.user=null;render();});
  
  // Navigation
  document.querySelectorAll('.nav-item[data-view]').forEach(item=>item.addEventListener('click',function(){ST.view=this.dataset.view;ST.selC=null;ST.selT=null;ST.modal=false;render();}));
  
  // Case tabs
  document.querySelectorAll('.case-tab').forEach(tab=>tab.addEventListener('click',function(){ST.activeTab=this.dataset.tab;render();}));
  
  // Buttons
  document.getElementById('newCaseBtn')?.addEventListener('click',()=>{ST.modalMode='newCase';ST.modal=true;render();});
  document.getElementById('addHearingBtn')?.addEventListener('click',()=>{ST.modalMode='hearing';ST.modal=true;render();});
  document.getElementById('syncAllHearingsBtn')?.addEventListener('click',async()=>{if(ST.selC && ST.selC.hearings){for(let h of ST.selC.hearings){await syncToGoogleCalendar(ST.selC, h);}ST.suc='Hearings synced to calendar';render();}});
  document.getElementById('addUpdateBtn')?.addEventListener('click',async()=>{const input=document.getElementById('newUpdateInput');if(input && input.value.trim()){const updates=ST.selC.updates||[];updates.unshift({date:new Date().toISOString(),message:input.value.trim()});await DS.updCase(ST.selC.id,{updates});ST.selC.updates=updates;input.value='';render();}});
  document.getElementById('newTaskForCaseBtn')?.addEventListener('click',()=>{ST.modalMode='task';ST.modal=true;render();});
  document.getElementById('newTaskBtn')?.addEventListener('click',()=>{ST.modalMode='task';ST.modal=true;render();});
  document.getElementById('newTeamBtn')?.addEventListener('click',async()=>{const name=prompt('Team name:');if(name) await DS.addTeam({name,lawFirmId:ST.user.lawFirmId,memberIds:[]});render();});
  document.getElementById('addTimeBtn')?.addEventListener('click',()=>{const taskId=prompt('Task ID:');const mins=parseInt(prompt('Minutes worked:'));if(taskId && mins) DS.addTimeLog({taskId,userId:ST.user.id,lawFirmId:ST.user.lawFirmId,date:new Date().toISOString().slice(0,10),durationMinutes:mins,billable:true,notes:''}).then(()=>render());});
  document.getElementById('saveProfileBtn')?.addEventListener('click',async()=>{ST.user.firstName=document.getElementById('pfn')?.value;ST.user.lastName=document.getElementById('pln')?.value;ST.user.email=document.getElementById('pem')?.value;ST.user.phone=document.getElementById('pph')?.value;ST.user.hourlyRate=parseFloat(document.getElementById('phr')?.value||0);ST.user.description=document.getElementById('pde')?.value;await DS.sprofile(ST.user.id,ST.user);ST.suc='Profile updated!';render();});
  document.getElementById('taskFilter')?.addEventListener('change',function(){ST.filt.status=this.value;render();});
  
  // Delete buttons
  document.querySelectorAll('.delete-team').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation();if(confirm('Delete this team?')){await DS.delTeam(btn.dataset.id);render();}}));
  document.querySelectorAll('.delete-time-log').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation();await DS.deleteTimeLog(btn.dataset.id);render();}));
  
  // Hearing sync buttons
  document.querySelectorAll('.sync-hearing').forEach(btn=>btn.addEventListener('click',async(e)=>{const idx=parseInt(btn.dataset.idx);const hearing=ST.selC.hearings[idx];await syncToGoogleCalendar(ST.selC,hearing);ST.suc='Hearing synced to calendar';render();}));
  
  // Approvals
  document.querySelectorAll('.approve-btn').forEach(btn=>btn.addEventListener('click',async()=>{await DS.approveJoin(btn.dataset.uid);render();}));
  document.querySelectorAll('.reject-btn').forEach(btn=>btn.addEventListener('click',async()=>{await DS.rejectJoin(btn.dataset.uid);render();}));
  
  // Modal
  document.getElementById('closeModalBtn')?.addEventListener('click',()=>{ST.modal=false;render();});
  document.getElementById('modalCancelBtn')?.addEventListener('click',()=>{ST.modal=false;render();});
  document.getElementById('modalSaveBtn')?.addEventListener('click',async()=>{
    if(ST.modalMode === 'hearing'){
      const date = document.getElementById('hearingDate')?.value;
      const time = document.getElementById('hearingTime')?.value;
      const desc = document.getElementById('hearingDesc')?.value;
      const reminder = parseInt(document.getElementById('hearingReminder')?.value||30);
      if(date){
        const newHearing = {date, time: time||'09:00', description: desc, reminderMinutes: reminder};
        const hearings = [...(ST.selC.hearings||[]), newHearing];
        await DS.updCase(ST.selC.id, {hearings});
        await syncToGoogleCalendar(ST.selC, newHearing);
        ST.suc = 'Hearing added and synced to calendar';
        ST.modal = false;
        render();
      }
    } else if(ST.modalMode === 'task'){
      const title = document.getElementById('taskTitle')?.value;
      if(title){
        const as = document.getElementById('taskAssignees');
        await DS.addTask({
          title: title,
          description: document.getElementById('taskDesc')?.value,
          dueDate: document.getElementById('taskDue')?.value,
          priority: document.getElementById('taskPriority')?.value,
          status: document.getElementById('taskStatus')?.value,
          assigneeIds: as ? Array.from(as.selectedOptions).map(o=>o.value) : [],
          caseId: ST.selC?.id || null,
          lawFirmId: ST.user.lawFirmId,
          createdById: ST.user.id
        });
        ST.modal = false;
        render();
      }
    } else if(ST.modalMode === 'newCase'){
      const name = document.getElementById('caseName')?.value;
      if(name){
        await DS.addCase({
          caseName: name,
          clientName: document.getElementById('clientName')?.value,
          caseRef: document.getElementById('caseRef')?.value,
          status: document.getElementById('caseStatus')?.value,
          details: document.getElementById('caseDetails')?.value,
          lawFirmId: ST.user.lawFirmId,
          hearings: [],
          updates: []
        });
        ST.modal = false;
        render();
      }
    }
  });
}

// Auth handlers
async function handleEmailLogin(){
  const em=document.getElementById('le')?.value;
  const pw=document.getElementById('lp')?.value;
  if(!em||!pw){ST.err='Fill all fields';render();return}
  if(useFB){
    try{
      const cred=await auth.signInWithEmailAndPassword(em,pw);
      const p=await DS.uprofile(cred.user.uid);
      if(p){ST.user=p;ST.view='dashboard';render();}
      else{const pending=await DS.getPendingStatus(cred.user.uid);if(pending){ST.err='Account pending approval';await auth.signOut();render();}else{ST.err='Account not found';await auth.signOut();render();}}
    }catch(err){ST.err=err.message;render();}
  }else{
    const u=g(LS.U).find(x=>x.email===em&&x.password===pw);
    if(u){ST.user=u;s(LS.CUR,u);ST.view='dashboard';render();}
    else{ST.err='Invalid credentials';render();}
  }
}
async function handleGoogleLogin(){if(!useFB)return;const prov=new firebase.auth.GoogleAuthProvider();try{const res=await auth.signInWithPopup(prov);const p=await DS.uprofile(res.user.uid);if(p){ST.user=p;ST.view='dashboard';render();}else{ST.err='No account linked. Register first.';await auth.signOut();render();}}catch(err){ST.err=err.message;render();}}
async function handleRegister(){
  const fn=document.getElementById('rfn')?.value;
  const fi=document.getElementById('rfi')?.value;
  const la=document.getElementById('rla')?.value;
  const em=document.getElementById('re')?.value;
  const pw=document.getElementById('rp')?.value;
  const hr=parseFloat(document.getElementById('rhr')?.value||0);
  if(!fn||!fi||!la||!em||pw.length<6){ST.err='All fields required, password min 6';render();return}
  if(useFB){
    try{
      const cr=await auth.createUserWithEmailAndPassword(em,pw);
      const fid=DS.genId();
      const profile={email:em,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr};
      await DS.sprofile(cr.user.uid,profile);
      await DS.addFirm({firmId:fid,firmName:fn,createdBy:cr.user.uid});
      ST.user=profile;
      ST.suc='Firm created! Your Firm ID: '+fid;
      render();
    }catch(err){ST.err=err.message;render();}
  }else{
    const fid=DS.genId();
    const u={id:'U'+Date.now(),email:em,password:pw,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid,hourlyRate:hr};
    const users=g(LS.U);
    users.push(u);
    s(LS.U,users);
    await DS.addFirm({firmId:fid,firmName:fn,createdBy:u.id});
    ST.user=u;
    s(LS.CUR,u);
    ST.view='dashboard';
    render();
  }
}
async function handleJoin(){
  const fid=document.getElementById('jfi')?.value;
  const fi=document.getElementById('jfn')?.value;
  const la=document.getElementById('jln')?.value;
  const em=document.getElementById('je')?.value;
  const pw=document.getElementById('jp')?.value;
  const role=document.getElementById('jr')?.value;
  const hr=parseFloat(document.getElementById('jhr')?.value||0);
  if(!fid||!fi||!la||!em||pw.length<6){ST.err='All fields required';render();return}
  const firm=await DS.findFirm(fid);
  if(!firm){ST.err='Firm not found';render();return}
  if(useFB){
    try{
      const cr=await auth.createUserWithEmailAndPassword(em,pw);
      await DS.createJoinRequest(cr.user.uid,fid,{email:em,firstName:fi,lastName:la,role,hourlyRate:hr});
      ST.suc='Join request sent! Wait for approval.';
      await auth.signOut();
      render();
    }catch(err){ST.err=err.message;render();}
  }else{
    const uid='U'+Date.now();
    await DS.createJoinRequest(uid,fid,{email:em,firstName:fi,lastName:la,role,password:pw,hourlyRate:hr});
    ST.suc='Join request sent! Wait for approval.';
    ST.user=null;
    s(LS.CUR,null);
    render();
  }
}

render();
})();
