  <style>

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .auth-wrap{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#f0f4ff,#e8edf5);padding:20px}
    .auth-card{background:#fff;width:100%;max-width:400px;padding:30px 20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
    .auth-logo{font-size:24px;font-weight:700;color:var(--p);margin-bottom:8px}
    .auth-sub{color:var(--s);font-size:13px;margin-bottom:24px}
    .inp{margin-bottom:14px;text-align:left}
    .inp label{display:block;font-size:12px;font-weight:600;color:var(--t);margin-bottom:6px;text-transform:uppercase}
    .inp input,.inp select,.inp textarea{width:100%;padding:10px 12px;border:1px solid var(--b);border-radius:8px;font-size:14px;background:#fff;transition:border-color .2s}
    .inp input:focus,.inp select:focus,.inp textarea:focus{outline:0;border-color:var(--p);box-shadow:0 0 0 3px rgba(13,71,161,.1)}
    .btn{padding:10px 18px;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn-p{background:var(--p);color:#fff;width:100%}.btn-p:hover{background:#0a3a7e}
    .btn-o{background:#fff;border:1px solid var(--b);color:var(--t)}.btn-o:hover{background:#f8f9fa}
    .btn-d{background:#dc2626;color:#fff}.btn-d:hover{background:#b91c1c}
    .btn-sm{padding:6px 12px;font-size:12px;width:auto}
    .btn-google{background:#fff;border:1px solid var(--b);color:var(--t);width:100%}.btn-google:hover{background:#f8f9fa}
    .tabs{display:flex;gap:15px;margin-bottom:22px;justify-content:center}
    .tab{font-size:13px;font-weight:600;color:var(--s);cursor:pointer;padding:6px 10px;border-bottom:2px solid transparent;transition:.2s}
    .tab.active{color:var(--p);border-bottom-color:var(--p)}
    .err{background:#fee2e2;color:#b91c1c;padding:10px;border-radius:8px;margin-bottom:14px;font-size:12px}
    .suc{background:#d1fae5;color:#065f46;padding:10px;border-radius:8px;margin-bottom:14px;font-size:12px}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--s);font-size:12px}.divider::before,.divider::after{content:'';flex:1;border-bottom:1px solid var(--b)}
    .layout{display:flex;min-height:100vh}
    .sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100%;background:#fff;border-right:1px solid var(--b);z-index:200;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:var(--sh)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:150}
    .sidebar-backdrop.show{display:block}
    .sidebar-head{padding:16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}

    .sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}

    .firm-id{background:#f0f4ff;padding:4px 8px;border-radius:6px;font-family:monospace;font-size:12px}

    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
    .card{background:#fff;padding:16px;border-radius:12px;box-shadow:var(--sh);border-left:4px solid var(--p);cursor:pointer;transition:.2s}.card:hover{transform:translateY(-2px)}
    .card.green{border-left-color:#10b981}.card.orange{border-left-color:#f59e0b}.card.purple{border-left-color:#8b5cf6}
    .card-val{font-size:24px;font-weight:700;line-height:1.2}

    .task-table{width:100%;min-width:500px;border-collapse:collapse}

    .task-table td{padding:10px 12px;border-bottom:1px solid var(--b);font-size:13px}
    .task-table tr:hover{background:#f0f7ff;cursor:pointer}
    .badge-p{display:inline-block;padding:2px 6px;border-radius:12px;font-size:10px;font-weight:600;color:#fff}
    .badge-s{display:inline-block;padding:2px 6px;border-radius:12px;font-size:10px;font-weight:600;background:#e5e7eb;color:#374151}
    .badge-s.completed{background:#d1fae5;color:#065f46}.badge-s.in_progress{background:#dbeafe;color:#1e40af}
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;z-index:1000;padding:16px}
    .modal{background:#fff;width:100%;max-width:680px;max-height:90vh;border-radius:12px;overflow-y:auto}.modal-head{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}.modal-head h2{font-size:18px;font-weight:600}.modal-close{background:0 0;border:0;font-size:22px;cursor:pointer;color:var(--s)}.modal-body{padding:20px}.modal-foot{padding:14px 20px;border-top:1px solid var(--b);display:flex;gap:10px;justify-content:flex-end}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.ffull{grid-column:span 2}
    .empty{text-align:center;padding:40px;color:var(--s)}
    .clayout{display:flex;background:#fff;border-radius:12px;overflow:hidden;height:calc(100vh - 180px);min-height:350px}
    .crooms{width:200px;border-right:1px solid var(--b);overflow-y:auto;flex-shrink:0}.room{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:500;border-bottom:1px solid var(--b)}.room:hover{background:#f0f4ff}.room.active{background:#e8f0fe;color:var(--p)}.cmain{flex:1;display:flex;flex-direction:column}.msgs{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}.msg{max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4;word-wrap:break-word;position:relative}.msg.sent{align-self:flex-end;background:var(--p);color:#fff}.msg.received{align-self:flex-start;background:#f0f4ff}.msg-meta{font-size:10px;opacity:.8;margin-top:4px}.msg-del{display:none;position:absolute;top:4px;right:4px;background:rgba(0,0,0,.3);border:0;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:10px}.msg:hover .msg-del{display:block}.cinput{display:flex;padding:10px;border-top:1px solid var(--b)}.cinput textarea{flex:1;padding:10px;border:1px solid var(--b);border-radius:8px;resize:none;font-size:14px;min-height:42px}.send-btn{background:var(--p);color:#fff;border:0;border-radius:50%;width:42px;height:42px;margin-left:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}.clear-chat-btn{background:#dc2626;color:#fff;border:0;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;margin-left:8px}
    @media(min-width:769px){.sidebar{transform:translateX(0);position:static;width:var(--sidebar-w);height:auto;min-height:100vh}.main-content{margin-left:0}.hamburger{display:none}.sidebar-backdrop{display:none!important}.sidebar-close{display:none}}
  </style>

<script>
(function(){
const fbConfig={apiKey:"AIzaSyA1ptQA0We00UCjzY6NbK_ePHNEUMKxfV0",authDomain:"deep-seek-law-task-manager.firebaseapp.com",databaseURL:"https://deep-seek-law-task-manager-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"deep-seek-law-task-manager",storageBucket:"deep-seek-law-task-manager.firebasestorage.app",messagingSenderId:"349212320419",appId:"1:349212320419:web:5ab238257571ec5b925516"};
let useFB=false;try{firebase.initializeApp(fbConfig);useFB=true}catch(e){}
const auth=useFB?firebase.auth():null;
const db=useFB?firebase.database():null;
const LS={U:'u',F:'f',T:'t',C:'c',TE:'te',CUR:'cur'};
function g(k){return JSON.parse(localStorage.getItem(k)||'[]')}
function s(k,v){localStorage.setItem(k,JSON.stringify(v))}

const DS={
genId:()=>'LF-'+Math.random().toString(36).substr(2,8).toUpperCase(),
async uprofile(uid){if(useFB){const sn=await db.ref(`users/${uid}`).once('value');return sn.val()}return g(LS.U).find(x=>x.id===uid)},
async sprofile(uid,d){d.id=uid;if(useFB)await db.ref(`users/${uid}`).set(d);else{const u=g(LS.U);const i=u.findIndex(x=>x.id===uid);if(i>=0)u[i]=d;else u.push(d);s(LS.U,u)}},
async allU(){if(useFB){const sn=await db.ref('users').once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.U)},
async firms(){if(useFB){const sn=await db.ref('firms').once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.F)},
async sFirm(d){if(useFB)await db.ref(`firms/${d.firmId}`).set(d);else{const f=g(LS.F);const i=f.findIndex(x=>x.firmId===d.firmId);if(i>=0)f[i]=d;else f.push(d);s(LS.F,f)}},
async findFirm(id){const f=await this.firms();return f.find(x=>x.firmId===id)},
async addFirm(d){const n={...d,createdAt:new Date().toISOString()};await this.sFirm(n);return n},
async tasks(fid){if(useFB){const sn=await db.ref('tasks').orderByChild('lawFirmId').equalTo(fid).once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.T).filter(t=>t.lawFirmId===fid)},
async addTask(t){t.id='T'+Date.now();t.createdAt=t.updatedAt=new Date().toISOString();if(useFB)await db.ref(`tasks/${t.id}`).set(t);else{const a=g(LS.T);a.push(t);s(LS.T,a)}return t},
async updTask(id,u){u.updatedAt=new Date().toISOString();if(useFB){await db.ref(`tasks/${id}`).update(u);const sn=await db.ref(`tasks/${id}`).once('value');return sn.val()}else{const a=g(LS.T);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...u};s(LS.T,a);return a[i]}return null}},
async delTask(id){if(useFB){const sn=await db.ref('tasks').once('value');const all=sn.val()?Object.values(sn.val()):[];const subs=all.filter(t=>t.parentTaskId===id).map(t=>t.id);const up={};up[`tasks/${id}`]=null;subs.forEach(s=>up[`tasks/${s}`]=null);await db.ref().update(up)}else{let a=g(LS.T);const subs=a.filter(t=>t.parentTaskId===id).map(t=>t.id);a=a.filter(t=>t.id!==id&&!subs.includes(t.id));s(LS.T,a)}},
async cases(fid){if(useFB){const sn=await db.ref('cases').orderByChild('lawFirmId').equalTo(fid).once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.C).filter(c=>c.lawFirmId===fid)},
async addCase(c){c.id='C'+Date.now();c.createdAt=new Date().toISOString();if(useFB)await db.ref(`cases/${c.id}`).set(c);else{const a=g(LS.C);a.push(c);s(LS.C,a)}return c},
async updCase(id,u){if(useFB){await db.ref(`cases/${id}`).update(u);const sn=await db.ref(`cases/${id}`).once('value');return sn.val()}else{const a=g(LS.C);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...u};s(LS.C,a);return a[i]}return null}},
async delCase(id){if(useFB)await db.ref(`cases/${id}`).remove();else{let a=g(LS.C);a=a.filter(c=>c.id!==id);s(LS.C,a)}},
async teams(fid){if(useFB){const sn=await db.ref('teams').orderByChild('lawFirmId').equalTo(fid).once('value');return sn.val()?Object.values(sn.val()):[]}return g(LS.TE).filter(t=>t.lawFirmId===fid)},
async addTeam(t){t.id='E'+Date.now();t.createdAt=new Date().toISOString();if(useFB)await db.ref(`teams/${t.id}`).set(t);else{const a=g(LS.TE);a.push(t);s(LS.TE,a)}return t},
async updTeam(id,u){if(useFB){await db.ref(`teams/${id}`).update(u);const sn=await db.ref(`teams/${id}`).once('value');return sn.val()}else{const a=g(LS.TE);const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...u};s(LS.TE,a);return a[i]}return null}},
async delTeam(id){if(useFB)await db.ref(`teams/${id}`).remove();else{let a=g(LS.TE);a=a.filter(t=>t.id!==id);s(LS.TE,a)}},
// ─── APPROVAL SYSTEM ───
async createJoinRequest(uid,firmId,profile){
  const req={...profile,status:'pending',firmId,uid};
  if(useFB){
    await db.ref(`pendingUsers/${uid}`).set(req);
    await db.ref(`requests/${firmId}/${uid}`).set(req);
  }else{
    let pend=JSON.parse(localStorage.getItem('pending')||'{}');
    pend[uid]=req;
    localStorage.setItem('pending',JSON.stringify(pend));
    let reqs=JSON.parse(localStorage.getItem('firm_reqs')||'{}');
    if(!reqs[firmId]) reqs[firmId]={};
    reqs[firmId][uid]=req;
    localStorage.setItem('firm_reqs',JSON.stringify(reqs));
  }
},
async getPendingStatus(uid){
  if(useFB){const sn=await db.ref(`pendingUsers/${uid}`).once('value');return sn.val()}
  const pend=JSON.parse(localStorage.getItem('pending')||'{}');
  return pend[uid]||null;
},
async getFirmRequests(fid){
  if(useFB){const sn=await db.ref(`requests/${fid}`).once('value');return sn.val()?Object.values(sn.val()):[]}
  const reqs=JSON.parse(localStorage.getItem('firm_reqs')||'{}');
  return reqs[fid]?Object.values(reqs[fid]):[];
},
async approveJoin(uid){
  if(useFB){
    const reqSnap=await db.ref(`pendingUsers/${uid}`).once('value');
    const req=reqSnap.val(); if(!req)return;
    await db.ref(`users/${uid}`).set({
      email:req.email, firstName:req.firstName, lastName:req.lastName,
      role:req.role, lawFirmId:req.firmId, id:uid
    });
    await db.ref(`pendingUsers/${uid}`).remove();
    await db.ref(`requests/${req.firmId}/${uid}`).remove();
  }else{
    let pend=JSON.parse(localStorage.getItem('pending')||'{}');
    const req=pend[uid]; if(!req)return;
    let users=g(LS.U);
    users.push({email:req.email, firstName:req.firstName, lastName:req.lastName, role:req.role, lawFirmId:req.firmId, id:uid});
    s(LS.U,users);
    delete pend[uid]; localStorage.setItem('pending',JSON.stringify(pend));
    let reqs=JSON.parse(localStorage.getItem('firm_reqs')||'{}');
    if(reqs[req.firmId]){delete reqs[req.firmId][uid]; localStorage.setItem('firm_reqs',JSON.stringify(reqs));}
  }
},
async rejectJoin(uid){
  if(useFB){
    const reqSnap=await db.ref(`pendingUsers/${uid}`).once('value');
    const req=reqSnap.val(); if(!req)return;
    await db.ref(`pendingUsers/${uid}`).remove();
    await db.ref(`requests/${req.firmId}/${uid}`).remove();
  }else{
    let pend=JSON.parse(localStorage.getItem('pending')||'{}');
    const req=pend[uid]; if(!req)return;
    delete pend[uid]; localStorage.setItem('pending',JSON.stringify(pend));
    let reqs=JSON.parse(localStorage.getItem('firm_reqs')||'{}');
    if(reqs[req.firmId]){delete reqs[req.firmId][uid]; localStorage.setItem('firm_reqs',JSON.stringify(reqs));}
  }
},
// ─── CHAT (same as before) ───
_listeners:{},
attachChatListeners(fid){
  if(!useFB||!fid)return;
  if(this._listeners[fid])return;
  this._listeners[fid]=true;
  db.ref(`chat/${fid}/general`).on('value',()=>{ if(ST.view==='chat'&&ST.chatRoom==='general') this.loadMsgs(); });
  db.ref(`chat/${fid}/teams`).on('value',(snap)=>{
    if(ST.view!=='chat'||ST.chatRoom!=='team')return;
    const teams=snap.val()||{};
    Object.keys(teams).forEach(tid=>{
      db.ref(`chat/${fid}/teams/${tid}`).on('value',()=>{
        if(ST.view==='chat'&&ST.chatRoom==='team'&&ST.chatTeam===tid) this.loadMsgs();
      });
    });
  });
},
detachChatListeners(fid){if(useFB&&fid){db.ref(`chat/${fid}/general`).off();db.ref(`chat/${fid}/teams`).off();delete this._listeners[fid];}},
async loadMsgs(){ST.chatMsgs=await this.getMsgs(ST.chatRoom,ST.chatTeam);refreshChat()},
async getMsgs(room,tid){
  const fid=ST.user?.lawFirmId;
  if(useFB&&fid){
    const ref=tid?db.ref(`chat/${fid}/teams/${tid}`):db.ref(`chat/${fid}/general`);
    const sn=await ref.once('value'); return sn.val()?Object.values(sn.val()):[];
  }
  const all=JSON.parse(localStorage.getItem('chat_offline')||'[]');
  return all.filter(m=>m.room===room&&(!tid||m.teamId===tid));
},
async sendMsg(room,tid,text){
  const msg={text,senderId:ST.user.id,senderName:ST.user.firstName+' '+ST.user.lastName,timestamp:Date.now(),room,teamId:tid||null,id:'M'+Date.now()};
  if(useFB&&ST.user?.lawFirmId){
    const fid=ST.user.lawFirmId;
    const ref=tid?db.ref(`chat/${fid}/teams/${tid}/${msg.id}`):db.ref(`chat/${fid}/general/${msg.id}`);
    await ref.set(msg);
  }else{
    let all=JSON.parse(localStorage.getItem('chat_offline')||'[]'); all.push(msg);
    localStorage.setItem('chat_offline',JSON.stringify(all)); window.dispatchEvent(new Event('storage'));
  }
},
async deleteMsg(room,tid,msgId){
  if(useFB&&ST.user?.lawFirmId){
    const fid=ST.user.lawFirmId;
    const ref=tid?db.ref(`chat/${fid}/teams/${tid}/${msgId}`):db.ref(`chat/${fid}/general/${msgId}`);
    await ref.remove();
  }else{
    let all=JSON.parse(localStorage.getItem('chat_offline')||'[]'); all=all.filter(m=>m.id!==msgId);
    localStorage.setItem('chat_offline',JSON.stringify(all)); window.dispatchEvent(new Event('storage'));
  }
},
async clearRoom(room,tid){
  if(useFB&&ST.user?.lawFirmId){
    const fid=ST.user.lawFirmId;
    const ref=tid?db.ref(`chat/${fid}/teams/${tid}`):db.ref(`chat/${fid}/general`);
    await ref.remove();
  }else{
    let all=JSON.parse(localStorage.getItem('chat_offline')||'[]'); all=all.filter(m=>m.room!==room||m.teamId!==tid);
    localStorage.setItem('chat_offline',JSON.stringify(all)); window.dispatchEvent(new Event('storage'));
  }
}
};

let ST={user:null,view:'dashboard',selT:null,selC:null,selE:null,editT:null,modal:false,modalMode:'task',err:null,suc:null,filt:{status:'',priority:''},online:useFB,chatRoom:'general',chatTeam:null,chatMsgs:[]};

async function render(){
  try{
    const app=document.getElementById('app');
    if(!ST.user){app.innerHTML=aScr();bind();return}
    const firm=await DS.findFirm(ST.user.lawFirmId);
    app.innerHTML=mainApp(firm?firm.firmName:'Unknown');
    document.getElementById('main-area').innerHTML=await curView();
    if(window.innerWidth>=769){document.getElementById('sidebar').classList.add('open')}
    if(ST.view==='chat')refreshChat();

  document.getElementById('login-btn')?.addEventListener('click',handleEmailLogin);
  document.getElementById('google-btn')?.addEventListener('click',handleGoogleLogin);
  document.getElementById('reg-btn')?.addEventListener('click',handleRegister);
  document.getElementById('join-btn')?.addEventListener('click',handleJoin);
  document.getElementById('lo-btn')?.addEventListener('click',()=>{if(useFB)auth.signOut();else{s(LS.CUR,null);ST.user=null}DS.detachChatListeners(ST.user?.lawFirmId);render()});
  document.querySelectorAll('.nav-item[data-view]').forEach(item=>item.addEventListener('click',function(){
    const oldView=ST.view; ST.view=this.dataset.view; ST.modal=false; ST.editT=null;
    if(window.innerWidth<769)clS();
    if(oldView==='chat')DS.detachChatListeners(ST.user.lawFirmId);
    if(ST.view==='chat'){DS.attachChatListeners(ST.user.lawFirmId);DS.loadMsgs();}
    render();
  }));
  document.querySelectorAll('tr[data-tid]').forEach(row=>row.addEventListener('click',async function(){const tasks=await DS.tasks(ST.user.lawFirmId);const t=tasks.find(x=>x.id===this.dataset.tid);if(t){ST.selT=t;ST.modalMode='task';ST.modal=true;render()}}));
  document.querySelectorAll('.card[data-card]').forEach(card=>card.addEventListener('click',function(){const a=this.dataset.card;if(a==='cases'){ST.view='cases'}else{ST.view='tasks';if(a==='all')ST.filt={};if(a==='pending')ST.filt={status:'pending'}}ST.modal=false;render()}));
  document.getElementById('bnc')?.addEventListener('click',()=>{ST.view='createCase';render()});
  document.querySelectorAll('.vcb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const cs=await DS.cases(ST.user.lawFirmId);const c=cs.find(x=>x.id===this.dataset.cid);if(c){ST.selC=c;ST.modalMode='case';ST.modal=true;render()}}));
  document.querySelectorAll('.ecb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const cs=await DS.cases(ST.user.lawFirmId);const c=cs.find(x=>x.id===this.dataset.cid);if(c){ST.selC=c;ST.modalMode='case-edit';ST.modal=true;render()}}));
  document.querySelectorAll('.dcb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();if(confirm('Delete case?')){await DS.delCase(this.dataset.cid);render()}}));
  document.getElementById('bnt')?.addEventListener('click',()=>{ST.view='createTeam';render()});
  document.querySelectorAll('.etb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const ts=await DS.teams(ST.user.lawFirmId);const t=ts.find(x=>x.id===this.dataset.eid);if(t){ST.selE=t;ST.modalMode='team';ST.modal=true;render()}}));
  document.querySelectorAll('.dtb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();if(confirm('Delete team?')){await DS.delTeam(this.dataset.eid);render()}}));
  document.querySelectorAll('.rlb').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const uid=this.dataset.uid;const users=await DS.allU();const u=users.find(x=>x.id===uid);if(!u)return;const opts=['managing_partner','partner','associate','paralegal','admin'];const cell=document.getElementById('rl-'+uid);const sel=document.createElement('select');opts.forEach(r=>{const o=document.createElement('option');o.value=r;o.text=r.replace('_',' ');if(r===u.role)o.selected=true;sel.appendChild(o)});const sb=document.createElement('button');sb.className='btn btn-p btn-sm';sb.innerHTML='✓';const cb=document.createElement('button');cb.className='btn btn-o btn-sm';cb.innerHTML='✕';cell.innerHTML='';cell.appendChild(sel);cell.appendChild(sb);cell.appendChild(cb);sb.addEventListener('click',async()=>{u.role=sel.value;await DS.sprofile(u.id,u);render()});cb.addEventListener('click',()=>render())}));
  // Approvals buttons
  document.querySelectorAll('.approve-btn').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const uid=this.dataset.uid;if(confirm('Approve this user?')){await DS.approveJoin(uid);render();}}));
  document.querySelectorAll('.reject-btn').forEach(b=>b.addEventListener('click',async function(e){e.stopPropagation();const uid=this.dataset.uid;if(confirm('Reject this user?')){await DS.rejectJoin(uid);render();}}));
  document.querySelectorAll('.room').forEach(room=>room.addEventListener('click',async function(){ST.chatRoom=this.dataset.room;ST.chatTeam=this.dataset.room==='team'?this.dataset.tid:null;DS.attachChatListeners(ST.user.lawFirmId);ST.chatMsgs=await DS.getMsgs(ST.chatRoom,ST.chatTeam);render()}));
  document.getElementById('scb')?.addEventListener('click',sendChat);
  document.getElementById('ci')?.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});
  document.getElementById('clear-chat')?.addEventListener('click',clearChat);
  document.querySelectorAll('.msg-del').forEach(b=>b.addEventListener('click',function(e){e.stopPropagation();deleteMsg(this.dataset.msgid)}));
  document.getElementById('mclose')?.addEventListener('click',()=>{ST.modal=false;ST.editT=null;render()});
  document.getElementById('bcb')?.addEventListener('click',()=>{ST.modal=false;ST.editT=null;render()});
  document.getElementById('mo')?.addEventListener('click',function(e){if(e.target===this){ST.modal=false;ST.editT=null;render()}});
  document.getElementById('bet')?.addEventListener('click',()=>{ST.editT=ST.selT;render()});
  document.getElementById('bdt')?.addEventListener('click',async()=>{if(confirm('Delete task?')){await DS.delTask(ST.selT.id);ST.modal=false;render()}});
  document.getElementById('bas')?.addEventListener('click',async()=>{const t=prompt('Sub-task title:');if(t){await DS.addTask({title:t.trim(),description:'',status:'pending',priority:ST.selT.priority,assigneeIds:[...ST.selT.assigneeIds||[]],parentTaskId:ST.selT.id,isSubTask:true,lawFirmId:ST.user.lawFirmId,createdById:ST.user.id,tags:[]});render();ST.selT=(await DS.tasks(ST.user.lawFirmId)).find(x=>x.id===ST.selT.id);render()}});
  document.getElementById('bse')?.addEventListener('click',async()=>{if(ST.modalMode==='case-edit'){const ts=document.getElementById('ecs');await DS.updCase(ST.selC.id,{caseName:document.getElementById('ecn').value,caseRef:document.getElementById('ecr').value,clientName:document.getElementById('ecl').value,handlingLawyer:document.getElementById('eclw').value,status:ts.value,details:document.getElementById('ecd').value,billingAmount:document.getElementById('ecb').value,billingNotes:document.getElementById('ecbn').value});ST.modal=false;render()}else if(ST.modalMode==='team'){const ms=document.getElementById('etmm');await DS.updTeam(ST.selE.id,{name:document.getElementById('etmn').value,memberIds:Array.from(ms.selectedOptions).map(o=>o.value)});ST.modal=false;render()}});
  const taskBtn=document.getElementById('task-btn');if(taskBtn)taskBtn.addEventListener('click',async()=>{const t=document.getElementById('ctt')?.value?.trim();if(!t)return;const as=document.getElementById('cta');const pt=document.getElementById('ctpt')?.value;const cid=document.getElementById('ctc')?.value;const tg=document.getElementById('ctg')?.value.split(',').map(s=>s.trim()).filter(Boolean);await DS.addTask({title:t,description:document.getElementById('ctd').value,dueDate:document.getElementById('ctdu').value,priority:document.getElementById('ctp').value,status:document.getElementById('cts').value,assigneeIds:Array.from(as.selectedOptions).map(o=>o.value),tags:tg,parentTaskId:pt||null,isSubTask:!!pt,caseId:cid||null,lawFirmId:ST.user.lawFirmId,createdById:ST.user.id,notes:document.getElementById('ctno').value});ST.view='tasks';render()});
  const caseBtn=document.getElementById('case-btn');if(caseBtn)caseBtn.addEventListener('click',async()=>{const n=document.getElementById('ccn')?.value?.trim();if(!n)return;const cl=document.getElementById('ccl')?.value?.trim();const lw=document.getElementById('cclw')?.value;const ts=document.getElementById('cct');await DS.addCase({caseName:n,caseRef:document.getElementById('ccr').value,clientName:cl,handlingLawyer:lw,assignedTeam:Array.from(ts.selectedOptions).map(o=>o.value),status:document.getElementById('ccs').value,details:document.getElementById('ccd').value,billingAmount:document.getElementById('ccb').value,billingNotes:document.getElementById('ccbn').value,lawFirmId:ST.user.lawFirmId,createdBy:ST.user.id});ST.view='cases';render()});
  const teamBtn=document.getElementById('team-btn');if(teamBtn)teamBtn.addEventListener('click',async()=>{const n=document.getElementById('etn')?.value?.trim();if(!n)return;const ms=document.getElementById('etm');await DS.addTeam({name:n,memberIds:Array.from(ms.selectedOptions).map(o=>o.value),lawFirmId:ST.user.lawFirmId,createdBy:ST.user.id});ST.view='teams';render()});
  document.getElementById('fs')?.addEventListener('change',function(){ST.filt.status=this.value;render()});
  document.getElementById('bcp')?.addEventListener('click',()=>navigator.clipboard.writeText(ST.user.lawFirmId).then(()=>alert('Copied!')));
  if(document.getElementById('ccf'))populateLawyers();
  if(document.getElementById('etf'))populateTeamMembers();
  if(document.getElementById('ctf')){populateParentTasks(); document.getElementById('ctte')?.addEventListener('change',function(){const tid=this.value;const as=document.getElementById('cta');if(tid){DS.teams(ST.user.lawFirmId).then(ts=>{const t=ts.find(x=>x.id===tid);if(t)Array.from(as.options).forEach(o=>o.selected=t.memberIds.includes(o.value))})}});}
}

async function sendChat(){const i=document.getElementById('ci');if(!i||!i.value.trim())return;await DS.sendMsg(ST.chatRoom,ST.chatTeam,i.value.trim());i.value='';ST.chatMsgs=await DS.getMsgs(ST.chatRoom,ST.chatTeam);refreshChat()}
async function handleEmailLogin(){const em=document.getElementById('le')?.value?.trim();const pw=document.getElementById('lp')?.value?.trim();if(!em||!pw){ST.err='Fill all fields';render();return}ST.err=null;ST.suc=null;if(useFB){try{const cred=await auth.signInWithEmailAndPassword(em,pw);const p=await DS.uprofile(cred.user.uid);if(p){ST.user=p;DS.attachChatListeners(ST.user.lawFirmId);ST.view='dashboard';render();return}const pending=await DS.getPendingStatus(cred.user.uid);if(pending){ST.err='Your account is pending approval.';await auth.signOut();render();return}ST.err='Account not found. Register first.';await auth.signOut();render()}catch(err){ST.err=err.message;render()}}else{const u=g(LS.U).find(x=>x.email===em&&x.password===pw);if(u){ST.user=u;s(LS.CUR,u);ST.view='dashboard';render()}else{ST.err='Invalid';render()}}}
async function handleGoogleLogin(){if(!useFB)return;const prov=new firebase.auth.GoogleAuthProvider();try{const res=await auth.signInWithPopup(prov);const p=await DS.uprofile(res.user.uid);if(p){ST.user=p;DS.attachChatListeners(ST.user.lawFirmId);ST.view='dashboard';render();return}const pending=await DS.getPendingStatus(res.user.uid);if(pending){ST.err='Your account is pending approval.';await auth.signOut();render();return}ST.err='No account linked. Register first.';await auth.signOut();render()}catch(err){if(err.code!=='auth/popup-closed-by-user'){ST.err=err.message}render()}}
async function handleRegister(){const fn=document.getElementById('rfn')?.value?.trim();const fi=document.getElementById('rfi')?.value?.trim();const la=document.getElementById('rla')?.value?.trim();const em=document.getElementById('re')?.value?.trim();const pw=document.getElementById('rp')?.value?.trim();if(!fn||!fi||!la||!em||pw.length<6){ST.err='All fields required, pw min 6';render();return}if(useFB){try{const cr=await auth.createUserWithEmailAndPassword(em,pw);const fid=DS.genId();const profile={email:em,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid};await DS.sprofile(cr.user.uid,profile);await DS.addFirm({firmId:fid,firmName:fn,createdBy:cr.user.uid});ST.user=profile;DS.attachChatListeners(fid);ST.suc='Firm created! '+fid;render()}catch(err){ST.err=err.message;render()}}else{const fid=DS.genId();const u={id:'U'+Date.now(),email:em,password:pw,firstName:fi,lastName:la,role:'managing_partner',lawFirmId:fid};const users=g(LS.U);users.push(u);s(LS.U,users);await DS.addFirm({firmId:fid,firmName:fn,createdBy:u.id});ST.user=u;s(LS.CUR,u);ST.view='dashboard';render()}}
async function handleJoin(){
  const fid=document.getElementById('jfi')?.value?.trim();
  const fi=document.getElementById('jfn')?.value?.trim();
  const la=document.getElementById('jln')?.value?.trim();
  const em=document.getElementById('je')?.value?.trim();
  const pw=document.getElementById('jp')?.value?.trim();
  const role=document.getElementById('jr')?.value;
  if(!fid||!fi||!la||!em||pw.length<6){ST.err='All fields required';render();return}
  const firm=await DS.findFirm(fid);
  if(!firm){ST.err='Firm not found';render();return}
  if(useFB){
    try{
      const cr=await auth.createUserWithEmailAndPassword(em,pw);
      await DS.createJoinRequest(cr.user.uid,fid,{email:em,firstName:fi,lastName:la,role});
      ST.suc='Join request sent! Wait for approval.';
      await auth.signOut();
      render();
    }catch(err){ST.err=err.message;render();}
  }else{
    const uid='U'+Date.now();
    await DS.createJoinRequest(uid,fid,{email:em,firstName:fi,lastName:la,role,password:pw});
    ST.suc='Join request sent! Wait for approval.';
    ST.user=null;
    s(LS.CUR,null);
    render();
  }
}

async function populateLawyers(){const sel=document.getElementById('cclw');if(!sel)return;const users=(await DS.allU()).filter(u=>u.lawFirmId===ST.user.lawFirmId);sel.innerHTML='<option value="">Select</option>'+users.filter(u=>['managing_partner','partner','associate'].includes(u.role)).map(u=>`<option value="${u.id}">${u.firstName} ${u.lastName}</option>`).join('')}
async function populateTeamMembers(){const sel=document.getElementById('etm');if(!sel)return;const users=(await DS.allU()).filter(u=>u.lawFirmId===ST.user.lawFirmId);sel.innerHTML=users.map(u=>`<option value="${u.id}">${u.firstName} ${u.lastName}</option>`).join('')}
async function populateParentTasks(){const sel=document.getElementById('ctpt');if(!sel)return;const tasks=await DS.tasks(ST.user.lawFirmId);sel.innerHTML='<option value="">None</option>'+tasks.filter(t=>!t.isSubTask).map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}

window.deleteMsg=deleteMsg;
render();
})();
